<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AK MINDSTEP | consult tracker</title>
    
    <!-- Dépendances -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .card-premium {
            background: #0f172a;
            border: 1px solid #1e293b;
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .animate-progress { animation: progress 2s ease-in-out infinite; }
        @keyframes progress { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        
        .page-transition { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; cursor: pointer; }

        /* Tooltip Recharts */
        .recharts-default-tooltip {
            background-color: #020617 !important;
            border: 1px solid #334155 !important;
            border-radius: 0.75rem !important;
            padding: 12px !important;
        }
        .recharts-tooltip-item { color: #ffffff !important; font-size: 12px !important; font-weight: 700 !important; }
        .recharts-tooltip-label { color: #94a3b8 !important; margin-bottom: 4px !important; font-size: 10px !important; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
    </script>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyDV_kmvQC6yAtA95efs33S17SiYopp0r2c",
            authDomain: "ak-minstep-consult-tracker.firebaseapp.com",
            projectId: "ak-minstep-consult-tracker",
            storageBucket: "ak-minstep-consult-tracker.firebasestorage.app",
            messagingSenderId: "1076236018116",
            appId: "1:1076236018116:web:9fdfdddede40fea2528491"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);
        const appIdGlobal = 'ak-mindstep-prod';

        const NAV_TABS = [
            { id: 'dash_month', label: 'Mensuel', icon: 'Calendar' },
            { id: 'dash_year', label: 'Annuel', icon: 'BarChart3' },
            { id: 'history', label: 'Journal', icon: 'BookOpen' },
            { id: 'settings', label: 'Réglages', icon: 'Settings' }
        ];

        const CHART_COLORS = ['#2dd4bf', '#6366f1', '#f59e0b', '#ec4899', '#8b5cf6', '#10b981', '#f97316'];
        const PAYMENT_METHODS = ['Virement bancaire', 'Espèces', 'INAMI'];

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconNode = window.lucide?.icons[name];
            return iconNode ? (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}
                    dangerouslySetInnerHTML={{ __html: iconNode.map(tag => `<${tag[0]} ${Object.entries(tag[1]).map(([k, v]) => `${k}="${v}"`).join(' ')}></${tag[0]}>`).join('') }}
                />
            ) : null;
        };

        const StatCard = ({ title, value, subValue, iconName, colorClass, highlight, children, isDarkMode }) => (
            <div className={`p-6 rounded-2xl border transition-all relative overflow-hidden ${highlight ? 'bg-teal-950/20 border-teal-500/30' : (isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200 shadow-sm')}`}>
                <div className="flex items-center justify-between mb-4">
                    <span className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">{title}</span>
                    <div className={`w-8 h-8 rounded-lg ${colorClass} bg-opacity-10 flex items-center justify-center shrink-0`}>
                        <Icon name={iconName} size={15} className={colorClass.replace('bg-', 'text-')} />
                    </div>
                </div>
                <div className={`text-2xl font-black tracking-tight mb-1 ${isDarkMode ? 'text-white' : 'text-slate-900'}`}>{value}</div>
                {subValue && <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wide">{subValue}</div>}
                {children}
            </div>
        );

        function App() {
            const [user, setUser] = React.useState(null);
            const [libsReady, setLibsReady] = React.useState(false);
            const [sessions, setSessions] = React.useState([]);
            const [inamiReceipts, setInamiReceipts] = React.useState({});
            const [loading, setLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('dash_month');
            const [viewDate, setViewDate] = React.useState(new Date());
            const [isDarkMode, setIsDarkMode] = React.useState(true);
            const [zoomLevel, setZoomLevel] = React.useState(100);
            const [filterCabinet, setFilterCabinet] = React.useState('Tous');
            const [editingId, setEditingId] = React.useState(null);

            const [cabinets, setCabinets] = React.useState(['Koekelberg', 'Bruxelles-Sud']);
            const [categories, setCategories] = React.useState(['Individuelle', 'Couple', 'Familiale']);

            const [formData, setFormData] = React.useState({
                amount: '', cabinet: '', category: '',
                date: new Date().toISOString().split('T')[0], modality: 'Présentiel',
                paymentMethod: 'Virement bancaire', isPaid: true, isCancellation: false, clientName: '', notes: ''
            });

            const monthKey = `${viewDate.getFullYear()}-${(viewDate.getMonth() + 1).toString().padStart(2, '0')}`;
            const yearKey = viewDate.getFullYear().toString();
            const monthTitleLabel = new Intl.DateTimeFormat('fr-FR', {month:'long', year:'numeric'}).format(viewDate);

            const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, PieChart, Pie, Legend } = window.Recharts || {};

            // --- AUTO SCROLL MANAGEMENT ---
            React.useEffect(() => {
                if (activeTab === 'dash_month' || activeTab === 'dash_year' || activeTab === 'settings') {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else if (activeTab === 'history') {
                    // Délai court pour laisser le temps au DOM de charger la liste
                    setTimeout(() => {
                        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    }, 100);
                }
            }, [activeTab]);

            // --- SYNC FIREBASE ---
            React.useEffect(() => {
                const check = setInterval(() => { if (window.lucide && window.Recharts?.ResponsiveContainer) { setLibsReady(true); clearInterval(check); } }, 500);
                const unsubAuth = onAuthStateChanged(auth, (u) => { if (u) setUser(u); else signInAnonymously(auth); });
                return () => { clearInterval(check); unsubAuth(); };
            }, []);

            React.useEffect(() => {
                if (!user) return;
                const unsubSessions = onSnapshot(collection(db, 'artifacts', appIdGlobal, 'public', 'data', 'sessions'), (snap) => {
                    setSessions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                });
                const unsubInami = onSnapshot(collection(db, 'artifacts', appIdGlobal, 'public', 'data', 'inami_manual'), (snap) => {
                    const data = {};
                    snap.docs.forEach(d => data[d.id] = d.data().amount || 0);
                    setInamiReceipts(data);
                });
                const unsubSettings = onSnapshot(doc(db, 'artifacts', appIdGlobal, 'public', 'data', 'settings', 'config'), (snap) => {
                    if (snap.exists()) {
                        const d = snap.data();
                        if (d.cabinets) setCabinets(d.cabinets);
                        if (d.categories) setCategories(d.categories);
                        if (d.zoomLevel) setZoomLevel(d.zoomLevel);
                        if (d.isDarkMode !== undefined) setIsDarkMode(d.isDarkMode);
                    }
                });
                return () => { unsubSessions(); unsubInami(); unsubSettings(); };
            }, [user]);

            // --- CALCULS STATISTIQUES ---
            const stats = React.useMemo(() => {
                const selYear = viewDate.getFullYear();
                
                // --- MOIS ---
                const monthSessions = sessions.filter(s => s.date.startsWith(monthKey) && (filterCabinet === 'Tous' || s.cabinet === filterCabinet));
                const manualMoisValue = inamiReceipts[monthKey] || 0;
                
                const caActéMois = monthSessions.reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0);
                const bankMois = monthSessions.filter(s => s.paymentMethod !== 'INAMI' && s.isPaid).reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0) + manualMoisValue;
                const inamiWaitMois = monthSessions.filter(s => s.paymentMethod === 'INAMI' && !s.isPaid).reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0);
                // CORRECTION : Impayés Divers = Tout ce qui n'est pas INAMI et qui n'est pas payé
                const impayesDiversMois = monthSessions.filter(s => s.paymentMethod !== 'INAMI' && !s.isPaid).reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0);

                // --- ANNÉE ---
                const yearSessions = sessions.filter(s => s.date.startsWith(yearKey) && (filterCabinet === 'Tous' || s.cabinet === filterCabinet));
                const yearCaTotal = yearSessions.reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0);
                
                let yearInamiManualTotal = 0;
                Object.keys(inamiReceipts).forEach(k => { if(k.startsWith(yearKey)) yearInamiManualTotal += inamiReceipts[k]; });
                
                const yearBankTotal = yearSessions.filter(s => s.paymentMethod !== 'INAMI' && s.isPaid).reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0) + yearInamiManualTotal;
                const yearInamiWaitTotal = yearSessions.filter(s => s.paymentMethod === 'INAMI' && !s.isPaid).reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0);
                const yearImpayesDiversTotal = yearSessions.filter(s => s.paymentMethod !== 'INAMI' && !s.isPaid).reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0);

                const comparisonData = Array.from({ length: 12 }, (_, i) => {
                    const m = new Intl.DateTimeFormat('fr-FR', { month: 'short' }).format(new Date(selYear, i));
                    const entry = { name: m };
                    cabinets.forEach(cab => {
                        entry[cab] = sessions.filter(s => s.date.startsWith(`${selYear}-${(i+1).toString().padStart(2,'0')}`) && s.cabinet === cab).reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0);
                    });
                    return entry;
                });

                const buildPieData = (arr) => ({
                    cat: (categories || []).map(c => ({ name: c, value: arr.filter(s => s.category === c).length })),
                    mod: [{ name: 'Présentiel', value: arr.filter(s => s.modality === 'Présentiel').length }, { name: 'Visio', value: arr.filter(s => s.modality === 'Visio').length }],
                    pay: [
                        { name: 'INAMI Acté', value: arr.filter(s => s.paymentMethod === 'INAMI').reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0) },
                        { name: 'Espèces', value: arr.filter(s => s.paymentMethod === 'Espèces').reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0) },
                        { name: 'Bancaire', value: arr.filter(s => s.paymentMethod === 'Virement bancaire').reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0) }
                    ]
                });

                return {
                    month: { ca: caActéMois, bank: bankMois, inamiWait: inamiWaitMois, otherWait: impayesDiversMois, manual: manualMoisValue, count: monthSessions.length, ...buildPieData(monthSessions) },
                    year: { ca: yearCaTotal, bank: yearBankTotal, inamiWait: yearInamiWaitTotal, otherWait: yearImpayesDiversTotal, count: yearSessions.length, ...buildPieData(yearSessions) },
                    comparisonData
                };
            }, [sessions, monthKey, yearKey, inamiReceipts, cabinets, categories, filterCabinet, viewDate]);

            const groupedWeeks = React.useMemo(() => {
                const res = { "Semaine 1": [], "Semaine 2": [], "Semaine 3": [], "Semaine 4": [], "Semaine 5": [] };
                sessions.filter(s => s.date.startsWith(monthKey)).sort((a,b) => a.date.localeCompare(b.date)).forEach(s => {
                    const day = parseInt(s.date.split('-')[2]);
                    if (day <= 7) res["Semaine 1"].push(s);
                    else if (day <= 14) res["Semaine 2"].push(s);
                    else if (day <= 21) res["Semaine 3"].push(s);
                    else if (day <= 28) res["Semaine 4"].push(s);
                    else res["Semaine 5"].push(s);
                });
                return res;
            }, [sessions, monthKey]);

            // --- ACTIONS ---
            const startEdit = (s) => {
                setFormData({ 
                    ...s, 
                    amount: s.amount.toString(),
                    cabinet: s.cabinet || (cabinets[0] || ''),
                    category: s.category || (categories[0] || '')
                });
                setEditingId(s.id);
                setActiveTab('add');
            };

            const handleSave = async (e) => {
                e.preventDefault();
                const payload = { 
                    ...formData, 
                    cabinet: formData.cabinet || cabinets[0], 
                    category: formData.category || categories[0], 
                    amount: parseFloat(formData.amount), 
                    updatedAt: new Date().toISOString() 
                };
                if (editingId) await updateDoc(doc(db, 'artifacts', appIdGlobal, 'public', 'data', 'sessions', editingId), payload);
                else await addDoc(collection(db, 'artifacts', appIdGlobal, 'public', 'data', 'sessions'), { ...payload, createdAt: new Date().toISOString() });
                
                setFormData({ amount: '', clientName: '', notes: '', isCancellation: false, date: new Date().toISOString().split('T')[0], modality: 'Présentiel', isPaid: true, cabinet: '', category: '', paymentMethod: 'Virement bancaire' });
                setEditingId(null); 
                setActiveTab('history');
            };

            const saveInamiVal = async (v) => { await setDoc(doc(db, 'artifacts', appIdGlobal, 'public', 'data', 'inami_manual', monthKey), { amount: parseFloat(v) || 0 }); };
            const updateSettings = async (n) => await setDoc(doc(db, 'artifacts', appIdGlobal, 'public', 'data', 'settings', 'config'), n, { merge: true });

            const renderDonut = (title, data, colors, isAmount = false) => {
                const totalValue = data.reduce((acc, curr) => acc + curr.value, 0);
                const displayTotal = isAmount ? `${Math.round(totalValue).toLocaleString()}€` : totalValue;
                return (
                    <div className={`p-8 rounded-3xl border flex flex-col items-center relative overflow-hidden ${isDarkMode ? 'bg-slate-900/40 border-slate-800' : 'bg-white border-slate-100 shadow-sm'}`}>
                        <h3 className="text-[10px] font-black uppercase text-slate-500 mb-6 tracking-widest text-center">{title}</h3>
                        <div className="relative w-full h-[240px]">
                            <ResponsiveContainer width="100%" height="100%">
                                <PieChart>
                                    <Pie data={data.filter(d=>d.value>0)} innerRadius={70} outerRadius={90} dataKey="value" stroke={isDarkMode ? "#020617" : "#fff"} strokeWidth={3} paddingAngle={6}>
                                        {data.map((_, j) => <Cell key={j} fill={colors[j % colors.length]} />)}
                                    </Pie>
                                    <Tooltip />
                                </PieChart>
                            </ResponsiveContainer>
                            <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                <span className={`text-xl font-black tracking-tighter ${isDarkMode ? 'text-white' : 'text-slate-950'}`}>{displayTotal}</span>
                                <span className="text-[8px] font-bold uppercase text-slate-500 opacity-50 tracking-widest text-center">Total</span>
                            </div>
                        </div>
                        <div className="w-full mt-6 grid grid-cols-2 gap-y-2">
                            {data.filter(d=>d.value>0).map((e, i) => (
                                <div key={i} className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full" style={{backgroundColor: colors[i % colors.length]}}></div>
                                    <span className="text-[9px] font-bold text-slate-500 uppercase truncate">{e.name}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            if (loading || !libsReady) return <div className="h-screen flex items-center justify-center bg-slate-950"><div className="w-20 h-1 bg-slate-800 rounded-full overflow-hidden"><div className="w-full h-full bg-teal-500 animate-progress origin-left"></div></div></div>;

            return (
                <div className={`min-h-screen pb-32 transition-colors duration-500 ${isDarkMode ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'}`} style={{ zoom: zoomLevel / 100 }}>
                    
                    <header className={`hidden md:flex sticky top-0 z-50 px-10 h-20 items-center justify-between border-b backdrop-blur-xl ${isDarkMode ? 'bg-slate-950/90 border-slate-900' : 'bg-white/90 border-slate-200'}`}>
                        <div className="flex items-center gap-4 shrink-0">
                            <div className="p-2 bg-teal-500 rounded-xl text-slate-950 shadow-lg shadow-teal-500/20"><Icon name="Activity" size={18}/></div>
                            <h1 className={`font-black text-lg uppercase tracking-tight leading-none ${isDarkMode ? 'text-white' : 'text-slate-900'}`}>AK MINDSTEP <span className="font-medium opacity-50 ml-1 text-xs">| consult tracker</span></h1>
                        </div>
                        <nav className="flex items-center gap-2 h-full">
                            {NAV_TABS.map(t => <button key={t.id} onClick={() => {setActiveTab(t.id); setEditingId(null);}} className={`px-6 h-full text-[10px] font-black uppercase tracking-[0.2em] transition-all ${activeTab === t.id ? 'text-teal-400 border-b-2 border-teal-400' : 'text-slate-500 hover:text-white'}`}>{t.label}</button>)}
                        </nav>
                        <button onClick={() => { setIsDarkMode(!isDarkMode); updateSettings({isDarkMode: !isDarkMode}); }} className={`p-2.5 border rounded-xl transition-all ${isDarkMode ? 'border-slate-800 bg-slate-900' : 'border-slate-200 bg-white'}`}><Icon name={isDarkMode ? 'Sun' : 'Moon'} size={18}/></button>
                    </header>

                    <button onClick={() => {setActiveTab('add'); setEditingId(null);}} className={`fixed z-[60] bottom-28 right-6 md:bottom-12 md:right-12 w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-white hover:scale-110 active:scale-95 transition-all ${isDarkMode ? 'bg-teal-500' : 'bg-slate-900'}`}><Icon name="Plus" size={32} /></button>

                    <main className="p-4 md:p-12 max-w-7xl mx-auto space-y-12">
                        {activeTab === 'dash_month' && (
                            <div className="space-y-10 page-transition">
                                <header className="flex flex-col sm:flex-row justify-between items-center gap-6">
                                    <div className="flex items-center gap-5">
                                        <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1))} className="p-3 rounded-xl border border-slate-800 hover:border-teal-500 transition-colors"><Icon name="ChevronLeft" /></button>
                                        <h2 className="text-3xl font-black uppercase tracking-tighter">{monthTitleLabel}</h2>
                                        <button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1))} className="p-3 rounded-xl border border-slate-800 hover:border-teal-500 transition-colors"><Icon name="ChevronRight" /></button>
                                    </div>
                                    <div className={`flex gap-2 p-1.5 rounded-2xl border ${isDarkMode ? 'bg-slate-900/50 border-slate-800' : 'bg-white border-slate-200'}`}>
                                        <button onClick={() => setFilterCabinet('Tous')} className={`px-5 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest ${filterCabinet === 'Tous' ? 'bg-teal-500 text-slate-950' : 'text-slate-500'}`}>Tous</button>
                                        {cabinets.map(c => <button key={c} onClick={() => setFilterCabinet(c)} className={`px-5 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest ${filterCabinet === c ? 'bg-teal-500 text-slate-950' : 'text-slate-500'}`}>{c}</button>)}
                                    </div>
                                </header>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <StatCard isDarkMode={isDarkMode} title="CA Acté (Volume)" value={`${(stats.month?.ca || 0).toLocaleString()} €`} iconName="Activity" colorClass="bg-slate-400" />
                                    <StatCard isDarkMode={isDarkMode} title="Solde en Banque" value={`${(stats.month?.bank || 0).toLocaleString()} €`} iconName="Banknote" colorClass="bg-teal-500" highlight={true}>
                                        <div className="mt-4 pt-4 border-t border-slate-800/40 text-left">
                                            <label className="text-[9px] font-black uppercase text-teal-500 tracking-widest block mb-2">virement de l'inami (€) :</label>
                                            <input type="number" placeholder="0.00" className={`w-full p-4 rounded-xl text-lg font-black outline-none transition-all ${isDarkMode ? 'bg-slate-950 border-2 border-slate-800 text-white focus:border-teal-500' : 'bg-slate-50 border-2 border-slate-200 text-slate-900'}`} defaultValue={stats.month?.manual || ''} onBlur={(e) => saveInamiVal(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && (saveInamiVal(e.target.value), e.target.blur())} />
                                        </div>
                                    </StatCard>
                                    <StatCard isDarkMode={isDarkMode} title="INAMI à venir" value={`${(stats.month?.inamiWait || 0).toLocaleString()} €`} iconName="Stethoscope" colorClass="bg-indigo-500" />
                                    <StatCard isDarkMode={isDarkMode} title="Impayés Divers" value={`${(stats.month?.otherWait || 0).toLocaleString()} €`} iconName="Clock" colorClass="bg-red-500" />
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {renderDonut("Répartition Services", stats.month.cat, CHART_COLORS)}
                                    {renderDonut("Lieu de Consultation", stats.month.mod, ['#1e293b', '#2dd4bf'])}
                                    {renderDonut("Répartition CA Acté", stats.month.pay, ['#6366f1', '#fbbf24', '#2dd4bf'], true)}
                                </div>
                            </div>
                        )}

                        {activeTab === 'dash_year' && (
                            <div className="space-y-12 page-transition">
                                <header className="flex justify-between items-center"><h2 className="text-3xl font-black uppercase tracking-tighter">Bilan Annuel {viewDate.getFullYear()}</h2></header>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <StatCard isDarkMode={isDarkMode} title="Volume Annuel" value={`${(stats.year?.ca || 0).toLocaleString()} €`} iconName="BarChart" colorClass="bg-slate-400" />
                                    <StatCard isDarkMode={isDarkMode} title="Réel Encaissé" value={`${(stats.year?.bank || 0).toLocaleString()} €`} iconName="Banknote" colorClass="bg-teal-500" highlight={true} />
                                    <StatCard isDarkMode={isDarkMode} title="INAMI Attendu" value={`${(stats.year?.inamiWait || 0).toLocaleString()} €`} iconName="Stethoscope" colorClass="bg-indigo-500" />
                                    <StatCard isDarkMode={isDarkMode} title="Impayés Patients" value={`${(stats.year?.otherWait || 0).toLocaleString()} €`} iconName="AlertCircle" colorClass="bg-red-500" />
                                </div>
                                <div className={`p-8 rounded-[2rem] border h-[500px] flex flex-col shadow-xl ${isDarkMode ? 'bg-slate-900/50 border-slate-800' : 'bg-white border-slate-200'}`}>
                                    <h3 className="text-[10px] font-black uppercase text-slate-500 mb-10 tracking-[0.25em] text-center border-b border-slate-800/20 pb-4">Performance Mensuelle par Cabinet (€)</h3>
                                    <div className="flex-1">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={stats.comparisonData}>
                                                <CartesianGrid vertical={false} stroke={isDarkMode ? '#1e293b' : '#f1f5f9'} strokeDasharray="3 3" />
                                                <XAxis dataKey="name" axisLine={false} tick={{fill: '#94a3b8', fontSize: 10, fontWeight: 'bold'}} />
                                                <YAxis axisLine={false} tick={{fill: '#94a3b8', fontSize: 10}} />
                                                <Tooltip />
                                                <Legend verticalAlign="top" align="right" wrapperStyle={{paddingBottom: '20px', fontSize: '10px'}} />
                                                {cabinets.map((cab, i) => <Bar key={cab} dataKey={cab} fill={CHART_COLORS[i % CHART_COLORS.length]} radius={[4, 4, 0, 0]} barSize={20} />)}
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                                <h3 className="text-xl font-black uppercase text-teal-500 text-center pt-8 border-t border-slate-800">Analyses Globalisées de l'Exercice</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {renderDonut("Répartition Annuelle", stats.year.cat, CHART_COLORS)}
                                    {renderDonut("Lieux de Consultation", stats.year.mod, ['#1e293b', '#2dd4bf'])}
                                    {renderDonut("Répartition CA Annuel", stats.year.pay, ['#6366f1', '#fbbf24', '#2dd4bf'], true)}
                                </div>
                            </div>
                        )}

                        {activeTab === 'add' && (
                            <div className="max-w-xl mx-auto page-transition pt-10 pb-20">
                                <header className="flex justify-between items-center mb-8 px-4"><h2 className={`text-3xl font-black uppercase tracking-tight ${isDarkMode ? 'text-white' : 'text-slate-900'}`}>{editingId ? "Édition" : "Saisie"}</h2><button onClick={() => {setActiveTab('dash_month'); setEditingId(null);}} className="p-2 text-slate-500 hover:text-white"><Icon name="X" size={28} /></button></header>
                                <form onSubmit={handleSave} className={`p-10 rounded-[2.5rem] border-2 space-y-10 shadow-2xl ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'}`}>
                                    <div className="grid grid-cols-2 gap-8">
                                        <div className="space-y-3"><label className="text-[10px] font-black uppercase text-slate-500 ml-1 tracking-widest">Date</label><input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className={`w-full p-4 rounded-xl border font-bold text-sm outline-none focus:border-teal-500 transition-all ${isDarkMode ? 'bg-slate-950 border-slate-800 text-white' : 'bg-slate-50'}`} /></div>
                                        <div className="space-y-3"><label className="text-[10px] font-black uppercase text-slate-500 ml-1 tracking-widest">Patient</label><input type="text" placeholder="..." value={formData.clientName} onChange={e => setFormData({...formData, clientName: e.target.value})} className={`w-full p-4 rounded-xl border font-bold text-sm outline-none focus:border-teal-500 transition-all ${isDarkMode ? 'bg-slate-950 border-slate-800 text-white' : 'bg-slate-50'}`} /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        {(cabinets || []).map(c => <button key={c} type="button" onClick={() => setFormData({...formData, cabinet: c})} className={`py-3.5 rounded-xl border-2 transition-all font-black uppercase text-[10px] ${formData.cabinet === c ? 'bg-teal-500 border-teal-500 text-slate-950 shadow-lg' : 'border-slate-800 text-slate-500'}`}>{c}</button>)}
                                    </div>
                                    <div className="space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <button type="button" onClick={() => setFormData({...formData, modality: 'Présentiel'})} className={`py-4 rounded-xl border-2 transition-all font-black uppercase text-[10px] ${formData.modality === 'Présentiel' ? 'bg-teal-500 border-teal-500 text-slate-950 shadow-lg' : 'border-slate-800 text-slate-500'}`}>Présentiel</button>
                                            <button type="button" onClick={() => setFormData({...formData, modality: 'Visio'})} className={`py-4 rounded-xl border-2 transition-all font-black uppercase text-[10px] ${formData.modality === 'Visio' ? 'bg-teal-500 border-teal-500 text-slate-950 shadow-lg' : 'border-slate-800 text-slate-500'}`}>Visio</button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <button type="button" onClick={() => setFormData({...formData, isPaid: true})} className={`py-3.5 rounded-xl border-2 transition-all font-black uppercase text-[10px] ${formData.isPaid ? 'bg-teal-500/20 text-teal-400 border-teal-500/50' : 'border-slate-800 text-slate-500'}`}>Payé</button>
                                            <button type="button" onClick={() => setFormData({...formData, isPaid: false})} className={`py-3.5 rounded-xl border-2 transition-all font-black uppercase text-[10px] ${!formData.isPaid ? 'bg-red-500 border-red-500 text-white shadow-lg' : 'border-slate-800 text-slate-500'}`}>À Encaisser</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-1">Paiement</label><select value={formData.paymentMethod} onChange={e => setFormData({...formData, paymentMethod: e.target.value})} className="w-full p-4 rounded-xl border font-black text-xs outline-none bg-slate-950 border-slate-800">{PAYMENT_METHODS.map(p => <option key={p} value={p}>{p}</option>)}</select></div>
                                        <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-1">Service</label><select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full p-4 rounded-xl border font-black text-xs outline-none bg-slate-950 border-slate-800">{categories.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                                    </div>
                                    <textarea value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} placeholder="Notes..." className={`w-full p-4 rounded-xl border font-medium text-sm outline-none h-24 bg-slate-950 border-slate-800 focus:border-teal-500`}></textarea>
                                    <div className="relative pt-6 border-t border-slate-800/40 text-center"><span className="absolute left-6 bottom-14 font-black text-teal-600 text-5xl opacity-40 italic">€</span><input type="number" step="0.01" required placeholder="0.00" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className={`w-full py-12 rounded-[2rem] border-2 text-7xl font-black text-center outline-none focus:border-teal-500 bg-slate-950 border-slate-800 text-white transition-all`} /></div>
                                    <button type="submit" className="w-full py-7 rounded-[1.5rem] bg-teal-500 text-slate-950 font-black uppercase tracking-[0.4em] text-sm shadow-xl active:scale-95 transition-all">{editingId ? "Mettre à jour" : "Valider"}</button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-12 page-transition pb-24">
                                <header className="flex justify-between items-center px-4 border-b-2 border-slate-800/40 pb-6"><h2 className="text-3xl font-black uppercase tracking-tighter">Journal Hebdomadaire</h2><div className="px-5 py-2.5 bg-slate-900 border-2 border-slate-700 rounded-2xl text-[10px] font-black text-teal-400 uppercase">{(stats.month?.ca || 0).toLocaleString()} €</div></header>
                                {Object.entries(groupedWeeks).map(([wName, wSessions]) => wSessions.length > 0 && (
                                    <div key={wName} className="space-y-8">
                                        <div className="flex justify-between items-center px-6 border-l-8 border-teal-500 bg-slate-900/60 py-4 rounded-r-2xl"><h3 className="text-md font-black uppercase tracking-[0.2em]">{wName}</h3><p className="text-sm font-black text-teal-400">{wSessions.reduce((acc,s)=>acc+(parseFloat(s.amount)||0),0).toLocaleString()} €</p></div>
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                            {wSessions.map(s => (
                                                <div key={s.id} className={`p-8 rounded-[2rem] border-2 flex flex-col gap-6 shadow-xl transition-all group ${isDarkMode ? 'bg-slate-900 border-slate-800 hover:border-slate-700' : 'bg-white border-slate-200 hover:border-teal-500 shadow-slate-200'}`}>
                                                    <div className="flex justify-between items-start">
                                                        <div className="flex gap-5">
                                                            <div className="w-14 h-14 bg-slate-950 rounded-2xl flex items-center justify-center text-teal-500 shadow-inner group-hover:scale-110 transition-transform"><Icon name={s.modality === 'Visio' ? 'Video' : (s.paymentMethod==='INAMI'?'Building2':'User')} size={26} /></div>
                                                            <div className="space-y-2"><p className="text-lg font-black uppercase text-white leading-none">{s.clientName || 'Anonyme'}</p><p className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{s.category} • {s.cabinet} • {s.paymentMethod}</p></div>
                                                        </div>
                                                        <div className="text-right"><p className="text-2xl font-black mb-3 tracking-tighter text-white">{parseFloat(s.amount).toLocaleString()}€</p><button onClick={()=>updateDoc(doc(db,'artifacts',appIdGlobal,'public','data','sessions',s.id),{isPaid:!s.isPaid})} className={`text-[9px] font-black uppercase px-4 py-2 rounded-xl border-2 transition-all ${s.isPaid ? 'bg-teal-500/10 text-teal-400 border-teal-500/30' : 'bg-red-500 text-white border-red-600 shadow-lg'}`}>{s.isPaid ? 'ENCAISSÉ' : 'À PAYER'}</button></div>
                                                    </div>
                                                    {s.notes && <div className="p-4 rounded-xl text-[11px] font-medium leading-relaxed italic bg-slate-950/50 text-slate-400 border-l-4 border-slate-700">{s.notes}</div>}
                                                    <div className="flex justify-between items-center pt-5 border-t border-slate-800/40">
                                                        <p className="text-[10px] font-black uppercase text-slate-500 tracking-widest">{new Date(s.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'long'})}</p>
                                                        <div className="flex gap-3">
                                                            <button onClick={()=>startEdit(s)} className="p-2 text-slate-600 hover:text-teal-400 hover:bg-teal-400/10 rounded-xl transition-all"><Icon name="Edit2" size={18}/></button>
                                                            <button onClick={()=>deleteDoc(doc(db,'artifacts',appIdGlobal,'public','data','sessions',s.id))} className="p-2 text-slate-600 hover:text-red-500 hover:bg-red-500/10 rounded-xl transition-all"><Icon name="Trash2" size={18}/></button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="max-w-xl mx-auto space-y-10 page-transition pt-10 pb-24">
                                <h2 className="text-3xl font-black uppercase tracking-tighter text-center">Réglages</h2>
                                <div className={`p-10 rounded-[3rem] border-2 shadow-2xl space-y-12 bg-slate-900 border-slate-800`}>
                                    <div className="space-y-8">
                                        <h3 className="text-[10px] font-black uppercase text-teal-500 border-b-2 border-slate-800 pb-4">Apparence</h3>
                                        <div className="flex items-center justify-between"><label className="text-xs font-black uppercase text-slate-400">Mode Sombre Force</label><button onClick={()=>{setIsDarkMode(!isDarkMode); updateSettings({isDarkMode: !isDarkMode});}} className={`w-14 h-8 rounded-full relative transition-all ${isDarkMode?'bg-teal-500':'bg-slate-300'}`}><div className={`absolute top-1.5 w-6 h-6 rounded-full bg-white shadow-xl transition-all ${isDarkMode?'left-8.5':'left-1.5'}`} /></button></div>
                                        <div className="space-y-4 pt-4"><div className="flex items-center justify-between"><label className="text-xs font-black uppercase text-slate-400">Zoom Interface</label><span className="text-xs font-black text-teal-500">{zoomLevel}%</span></div><input type="range" min="80" max="150" value={zoomLevel} onChange={e=>setZoomLevel(parseInt(e.target.value))} onMouseUp={()=>updateSettings({zoomLevel})} className="w-full" /></div>
                                    </div>
                                    <div className="space-y-6 pt-4 border-t-2 border-slate-800">
                                        <div className="flex items-center justify-between"><h3 className="text-[10px] font-black uppercase text-teal-500">Cabinets</h3><button onClick={()=>{const n=[...cabinets, 'Nouveau']; setCabinets(n); updateSettings({cabinets:n});}} className="p-2 text-teal-500 hover:scale-110 transition-transform"><Icon name="Plus" size={20}/></button></div>
                                        <div className="space-y-3">{cabinets.map((c, i) => (<div key={i} className="flex gap-3"><input type="text" value={c} onChange={e=>{const n=[...cabinets]; n[i]=e.target.value; setCabinets(n);}} onBlur={()=>updateSettings({cabinets})} className={`flex-1 p-4 rounded-xl border text-[11px] font-black uppercase bg-slate-950 border-slate-800 text-white outline-none focus:border-teal-500`}/><button onClick={()=>{const n=cabinets.filter((_,idx)=>idx!==i); setCabinets(n); updateSettings({cabinets:n});}} className="p-4 text-red-500 bg-red-500/10 border-2 border-red-500/20 rounded-2xl hover:bg-red-500/20"><Icon name="X" size={18}/></button></div>))}</div>
                                    </div>
                                    <div className="space-y-6 pt-4 border-t-2 border-slate-800">
                                        <div className="flex items-center justify-between"><h3 className="text-[10px] font-black uppercase text-teal-500">Services</h3><button onClick={()=>{const n=[...categories, 'Nouveau']; setCategories(n); updateSettings({categories:n});}} className="p-2 text-teal-500 hover:scale-110 transition-transform"><Icon name="Plus" size={20}/></button></div>
                                        <div className="space-y-3">{categories.map((c, i) => (<div key={i} className="flex gap-3"><input type="text" value={c} onChange={e=>{const n=[...categories]; n[i]=e.target.value; setCategories(n);}} onBlur={()=>updateSettings({categories})} className={`flex-1 p-4 rounded-xl border text-[11px] font-black uppercase bg-slate-950 border-slate-800 text-white outline-none focus:border-teal-500`}/><button onClick={()=>{const n=categories.filter((_,idx)=>idx!==i); setCategories(n); updateSettings({categories:n});}} className="p-4 text-red-500 bg-red-500/10 border-2 border-red-500/20 rounded-2xl hover:bg-red-500/20"><Icon name="X" size={18}/></button></div>))}</div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className={`md:hidden fixed bottom-0 left-0 right-0 h-24 border-t-4 backdrop-blur-3xl flex items-center justify-around px-8 z-50 shadow-[0_-20px_50px_rgba(0,0,0,0.6)] ${isDarkMode ? 'bg-slate-950/98 border-slate-800' : 'bg-white/95 border-slate-200 shadow-slate-200'}`}>
                        {NAV_TABS.map(t => (
                            <button key={t.id} onClick={() => {setActiveTab(t.id); setEditingId(null);}} className={`flex flex-col items-center gap-2.5 transition-all ${activeTab === t.id ? 'text-teal-400 scale-110 font-black' : 'text-slate-600 opacity-60'}`}>
                                <div className={`p-3 rounded-[1.2rem] transition-all ${activeTab === t.id ? 'bg-teal-500/10' : ''}`}><Icon name={window.lucide?.icons[t.id === 'dash_month' ? 'Calendar' : t.id === 'dash_year' ? 'BarChart3' : t.id === 'history' ? 'BookOpen' : 'Settings'] ? (t.id === 'dash_month' ? 'Calendar' : t.id === 'dash_year' ? 'BarChart3' : t.id === 'history' ? 'BookOpen' : 'Settings') : 'Home'} size={26} /></div>
                                <span className="text-[8px] font-black uppercase tracking-[0.1em]">{t.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
