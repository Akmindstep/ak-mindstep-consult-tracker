<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ak Mindstep Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDV_kmvQC6yAtA95efs33S17SiYopp0r2c",
            authDomain: "ak-minstep-consult-tracker.firebaseapp.com",
            projectId: "ak-minstep-consult-tracker",
            storageBucket: "ak-minstep-consult-tracker.firebasestorage.app",
            messagingSenderId: "1076236018116",
            appId: "1:1076236018116:web:9fdfdddede40fea2528491"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            signInAnonymously(auth).then(() => {
                window.isFirebaseDone = true;
            }).catch(e => console.error("Erreur Auth:", e));
        } catch (err) {
            console.error("Erreur Init:", err);
        }
    </script>
</head>
<body class="bg-slate-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [status, setStatus] = useState("Vérification...");

            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.isFirebaseDone) {
                        setStatus("Connecté !");
                        clearInterval(interval);
                    }
                }, 500);
            }, []);

            return (
                <div className="flex flex-col items-center justify-center h-screen space-y-6">
                    <div className={`w-16 h-16 rounded-full border-4 border-t-transparent animate-spin ${status === "Connecté !" ? 'border-teal-500 shadow-[0_0_20px_rgba(20,184,166,0.5)]' : 'border-slate-700'}`}></div>
                    <div className="text-center">
                        <h1 className="text-3xl font-black italic tracking-tighter uppercase">Ak Mindstep</h1>
                        <p className="text-teal-500 font-bold text-[10px] tracking-[0.3em] uppercase mt-2">{status}</p>
                    </div>
                    
                    {status === "Connecté !" && (
                        <button 
                            className="bg-white text-slate-950 px-8 py-4 rounded-2xl font-black uppercase text-xs animate-bounce"
                            onClick={() => alert("L'APP EST PRÊTE !")}>
                            Entrer dans l'application
                        </button>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
