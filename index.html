<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ak Mindstep Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDV_kmvQC6yAtA95efs33S17SiYopp0r2c",
            authDomain: "ak-minstep-consult-tracker.firebaseapp.com",
            projectId: "ak-minstep-consult-tracker",
            storageBucket: "ak-minstep-consult-tracker.firebasestorage.app",
            messagingSenderId: "1076236018116",
            appId: "1:1076236018116:web:9fdfdddede40fea2528491"
        };

        // On rend les outils Firebase disponibles pour notre code React
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.fb = { collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, updateDoc };
    </script>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // On vérifie si Recharts est bien chargé avant de l'utiliser
        const SafeChart = () => {
            if (!window.Recharts) return <div className="text-white p-10">Chargement des graphiques...</div>;
            return <div className="text-teal-400 p-10 font-black">GRAPHIK READY !</div>;
        };

        const App = () => {
            const [isReady, setIsReady] = useState(false);

            useEffect(() => {
                // On attend 1 seconde que tout s'initialise
                const timer = setTimeout(() => setIsReady(true), 1000);
                return () => clearTimeout(timer);
            }, []);

            if (!isReady) {
                return (
                    <div className="flex flex-col items-center justify-center h-screen text-white font-sans">
                        <div className="w-12 h-12 border-4 border-teal-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <h1 className="text-xl font-black uppercase italic tracking-tighter">Ak Mindstep</h1>
                        <p className="opacity-50 text-[10px] uppercase font-bold tracking-widest mt-2">Démarrage...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-950 p-6 md:p-12 text-white font-sans">
                    <header className="flex items-center gap-4 mb-10">
                        <div className="p-3 bg-teal-500 rounded-2xl shadow-lg shadow-teal-500/20">
                            <i data-lucide="trending-up"></i>
                        </div>
                        <div>
                            <h1 className="text-2xl font-black uppercase italic tracking-tighter leading-none">Ak Mindstep</h1>
                            <p className="text-teal-500 text-[9px] font-black uppercase tracking-[0.2em] mt-1">Tracker en ligne</p>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-slate-900 p-8 rounded-[2.5rem] border border-white/5 shadow-2xl">
                            <h2 className="text-teal-500 font-black uppercase text-[10px] tracking-widest mb-4">Connexion Firebase</h2>
                            <div className="flex items-center gap-3">
                                <div className="w-2 h-2 bg-teal-500 rounded-full animate-pulse"></div>
                                <p className="text-xl font-bold">Base de données active</p>
                            </div>
                        </div>
                        
                        <div className="bg-slate-900 p-8 rounded-[2.5rem] border border-white/5">
                            <h2 className="text-slate-500 font-black uppercase text-[10px] tracking-widest mb-4">Prochaine étape</h2>
                            <p className="text-slate-300">Nous allons injecter ton tableau de bord complet.</p>
                        </div>
                    </div>
                    
                    <div className="mt-10 opacity-50 text-[9px] font-bold uppercase tracking-widest text-center">
                        Connecté à : ak-minstep-consult-tracker
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // On active les icônes après le rendu
        setTimeout(() => lucide.createIcons(), 1500);
    </script>
</body>
</html>
