<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ak Mindstep Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDV_kmvQC6yAtA95efs33S17SiYopp0r2c",
            authDomain: "ak-minstep-consult-tracker.firebaseapp.com",
            projectId: "ak-minstep-consult-tracker",
            storageBucket: "ak-minstep-consult-tracker.firebasestorage.app",
            messagingSenderId: "1076236018116",
            appId: "1:1076236018116:web:9fdfdddede40fea2528491"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.api = { collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, updateDoc, signInAnonymously };
        window.AppReady = true;
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        // On récupère Recharts de manière sûre
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts;
        const { LayoutDashboard, History, TrendingUp, Users, Wallet, Calendar, Trash2, CheckCircle, AlertCircle, Video, User, Users2, Home, FileSpreadsheet, CreditCard, BarChart3, X, MapPin, Settings, Plus, Sliders, Moon, Sun, Clock, ChevronLeft, ChevronRight, RotateCcw, Edit2 } = lucide;

        // Ici, je vais mettre une version simplifiée mais fonctionnelle pour tester l'affichage
        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dash_month');

            useEffect(() => {
                const checkReady = setInterval(() => {
                    if (window.AppReady) {
                        window.api.signInAnonymously(window.auth).then(res => {
                            setUser(res.user);
                            clearInterval(checkReady);
                        });
                    }
                }, 500);
            }, []);

            if (!user) return <div className="h-screen bg-slate-900 flex items-center justify-center text-white font-black uppercase tracking-widest animate-pulse">Initialisation Ak Mindstep...</div>;

            return (
                <div className="min-h-screen bg-slate-950 text-white font-sans p-4 md:p-10">
                    <header className="flex justify-between items-center mb-10">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-teal-500 rounded-lg"><TrendingUp size={20}/></div>
                            <h1 className="text-xl font-black uppercase italic">Ak Mindstep</h1>
                        </div>
                        <div className="text-[10px] font-bold bg-slate-800 px-4 py-2 rounded-full border border-slate-700">Utilisateur : {user.uid.substring(0,6)}</div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <div className="bg-slate-900 p-6 rounded-[2rem] border border-white/5 shadow-xl">
                            <p className="text-[9px] font-black uppercase text-slate-500 mb-2">CA Encaissé</p>
                            <p className="text-3xl font-black">0,00 €</p>
                        </div>
                        <div className="bg-slate-900 p-6 rounded-[2rem] border border-white/5 shadow-xl">
                            <p className="text-[9px] font-black uppercase text-slate-500 mb-2">Séances</p>
                            <p className="text-3xl font-black text-teal-500">Prêt à encober</p>
                        </div>
                        <button onClick={() => alert('Formulaire bientôt actif')} className="bg-teal-600 p-6 rounded-[2rem] flex items-center justify-center gap-3 hover:bg-teal-500 transition-all shadow-lg shadow-teal-500/20">
                            <Plus size={24} />
                            <span className="font-black uppercase text-xs tracking-widest">Ajouter une séance</span>
                        </button>
                    </div>

                    <div className="p-10 bg-slate-900/50 rounded-[2.5rem] border border-dashed border-white/10 text-center">
                        <p className="text-slate-500 font-bold uppercase text-[10px] tracking-widest">Aucune donnée pour le moment</p>
                        <p className="text-xs mt-2 opacity-40">Commence par ajouter ta première consultation !</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
