<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ak Mindstep Consult Tracker</title>
    <!-- Dépendances stables dans l'ordre de priorité -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --rounded-psy: 2.5rem; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .rounded-psy { border-radius: var(--rounded-psy); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-progress { animation: progress 2s ease-in-out infinite; }
        @keyframes progress { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .page-transition { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIGURATION ---
        const NAV_TABS_CONFIG = [
            { id: 'dash_month', label: 'Mensuel', icon: 'Calendar' },
            { id: 'dash_year', label: 'Annuel', icon: 'BarChart3' },
            { id: 'history', label: 'Journal', icon: 'BookOpen' },
            { id: 'settings', label: 'Réglages', icon: 'Settings' }
        ];

        const COLORS_LIGHT = ['#1e293b', '#0d9488', '#334155', '#0891b2', '#d97706', '#4f46e5', '#10b981', '#64748b'];
        const COLORS_DARK = ['#94a3b8', '#2dd4bf', '#cbd5e1', '#22d3ee', '#fbbf24', '#818cf8', '#34d399', '#94a3b8'];
        const CABINET_COLORS = ['#0f172a', '#0d9488', '#0891b2', '#f59e0b'];

        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, PieChart, Pie, Legend } = window.Recharts;

        // --- COMPOSANTS SÉCURISÉS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            if (!window.lucide) return null;
            const iconNode = window.lucide.icons[name];
            if (!iconNode) return null;
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}
                    dangerouslySetInnerHTML={{ __html: iconNode.map(tag => {
                        const [tagName, attrs] = tag;
                        const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                        return `<${tagName} ${attrStr}></${tagName}>`;
                    }).join('') }}
                />
            );
        };

        const StatCard = ({ title, value, subValue, iconName, colorClass, isDarkMode }) => (
            <div className={`${isDarkMode ? 'bg-slate-800 border-slate-700 shadow-lg' : 'bg-white border-slate-200 shadow-sm'} p-5 rounded-2xl border flex flex-col gap-3 relative overflow-hidden transition-all`}>
                <div className="flex items-center justify-between">
                    <span className={`text-[9px] font-black uppercase tracking-widest ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>{title}</span>
                    <div className={`w-8 h-8 rounded-lg ${colorClass} bg-opacity-20 flex items-center justify-center shrink-0`}>
                        <Icon name={iconName} size={14} className={isDarkMode ? 'text-white' : colorClass.replace('bg-', 'text-')} />
                    </div>
                </div>
                <div className={`text-2xl font-black tracking-tight leading-none ${isDarkMode ? 'text-white' : 'text-slate-900'}`}>{value}</div>
                {subValue && <div className={`text-[9px] font-bold uppercase tracking-tight ${isDarkMode ? 'text-slate-500' : 'text-slate-400'}`}>{subValue}</div>}
            </div>
        );

        const renderPieLabel = (props, isDarkMode) => {
            const { cx, cy, midAngle, innerRadius, outerRadius, value } = props;
            if (!value || value === 0) return null;
            const RADIAN = Math.PI / 180;
            const radius = outerRadius + 15;
            const x = cx + radius * Math.cos(-midAngle * RADIAN);
            const y = cy + radius * Math.sin(-midAngle * RADIAN);
            return <text x={x} y={y} fill={isDarkMode ? "#cbd5e1" : "#475569"} textAnchor={x > cx ? 'start' : 'end'} dominantBaseline="central" className="text-[10px] font-black">{value}</text>;
        };

        function App() {
            const [libsReady, setLibsReady] = React.useState(false);
            const [isDarkMode, setIsDarkMode] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('dash_month');
            const [sessions, setSessions] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [viewDate, setViewDate] = React.useState(new Date());

            const [cabinets, setCabinets] = React.useState(['Koekelberg', 'Bruxelles-Sud']);
            const [categories, setCategories] = React.useState(['Individuelle', 'Couple', 'Familiale']);
            const [paymentMethods, setPaymentMethods] = React.useState(['Virement bancaire', 'Espèces', 'INAMI']);
            const [zoomLevel, setZoomLevel] = React.useState(100);

            const [deleteId, setDeleteId] = React.useState(null);
            const [editingSession, setEditingSession] = React.useState(null);

            const [formData, setFormData] = React.useState({
                amount: '', cabinet: 'Koekelberg', category: 'Individuelle',
                date: new Date().toISOString().split('T')[0], modality: 'Présentiel',
                paymentMethod: 'Virement bancaire', isPaid: true, isCancellation: false, clientName: ''
            });

            React.useEffect(() => {
                const check = setInterval(() => {
                    if (window.Recharts && window.lucide) {
                        setLibsReady(true);
                        setLoading(false);
                        clearInterval(check);
                    }
                }, 500);
                return () => clearInterval(check);
            }, []);

            React.useEffect(() => {
                const saved = localStorage.getItem('mindstep_final_store');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setSessions(parsed.sessions || []);
                    if(parsed.settings) {
                        setCabinets(parsed.settings.cabinets || cabinets);
                        setCategories(parsed.settings.categories || categories);
                        setPaymentMethods(parsed.settings.payments || paymentMethods);
                        setZoomLevel(parsed.settings.zoom || 100);
                        setIsDarkMode(parsed.settings.dark !== undefined ? parsed.settings.dark : true);
                    }
                }
            }, []);

            React.useEffect(() => {
                if (libsReady) {
                    localStorage.setItem('mindstep_final_store', JSON.stringify({
                        sessions, settings: { cabinets, categories, payments: paymentMethods, zoom: zoomLevel, dark: isDarkMode }
                    }));
                }
            }, [sessions, cabinets, categories, paymentMethods, zoomLevel, isDarkMode, libsReady]);

            const stats = React.useMemo(() => {
                const selYear = viewDate.getFullYear();
                const selMonth = viewDate.getMonth();

                const getPeriodData = (isYearly) => {
                    const filtered = sessions.filter(s => {
                        const d = new Date(s.date);
                        return isYearly ? d.getFullYear() === selYear : (d.getMonth() === selMonth && d.getFullYear() === selYear);
                    });
                    const encaisse = filtered.filter(s => s.isPaid).reduce((acc, s) => acc + parseFloat(s.amount || 0), 0);
                    const attendu = filtered.filter(s => !s.isPaid).reduce((acc, s) => acc + parseFloat(s.amount || 0), 0);
                    
                    return { 
                        encaisse, attendu, total: encaisse + attendu, 
                        count: filtered.length, 
                        catData: categories.map(c => ({ name: c, value: filtered.filter(s => s.category === c).length })),
                        modData: ['Présentiel', 'Visio'].map(m => ({ name: m, value: filtered.filter(s => s.modality === m).length })),
                        payData: paymentMethods.map(p => ({ name: p, value: filtered.filter(s => s.paymentMethod === p && s.isPaid).reduce((acc, s) => acc + parseFloat(s.amount || 0), 0) })),
                        items: filtered 
                    };
                };

                const comparison = Array.from({ length: 12 }, (_, i) => {
                    const entry = { name: new Intl.DateTimeFormat('fr-FR', { month: 'short' }).format(new Date(selYear, i)) };
                    cabinets.forEach(cab => {
                        entry[cab] = sessions.filter(s => {
                            const d = new Date(s.date);
                            return d.getMonth() === i && d.getFullYear() === selYear && s.cabinet === cab;
                        }).reduce((acc, s) => acc + parseFloat(s.amount || 0), 0);
                    });
                    return entry;
                });

                return { month: getPeriodData(false), year: getPeriodData(true), comparison };
            }, [sessions, viewDate, cabinets, categories, paymentMethods]);

            const handleNav = (dir) => {
                if (activeTab === 'dash_month') setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + dir, 1));
                else setViewDate(new Date(viewDate.getFullYear() + dir, viewDate.getMonth(), 1));
            };

            const resetDate = () => setViewDate(new Date());

            const saveSession = (e) => {
                e.preventDefault();
                const sessionData = { ...formData, amount: parseFloat(formData.amount) };
                if (editingSession) {
                    setSessions(sessions.map(s => s.id === editingSession.id ? { ...sessionData, id: s.id } : s));
                    setEditingSession(null);
                } else {
                    setSessions([{ ...sessionData, id: Date.now() }, ...sessions]);
                    setActiveTab('history');
                }
                setFormData({ ...formData, amount: '', clientName: '', isCancellation: false });
            };

            const handleUpdate = (e) => {
                e.preventDefault();
                const sessionData = { ...formData, amount: parseFloat(formData.amount) };
                setSessions(sessions.map(s => s.id === editingSession.id ? { ...sessionData, id: s.id } : s));
                setEditingSession(null);
                setFormData({ ...formData, amount: '', clientName: '', isCancellation: false });
            };

            const handleExportCSV = () => {
                if (sessions.length === 0) return;
                const headers = ["Date", "Cabinet", "Client", "Categorie", "Statut", "Montant"];
                const rows = sessions.map(s => [s.date, s.cabinet, s.clientName || "N/A", s.category, s.isPaid ? "Paye" : "Impaye", s.amount]);
                const csvContent = [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `ak_mindstep_export.csv`;
                link.click();
            };

            if (loading || !libsReady) return <div className="h-screen flex items-center justify-center bg-slate-950 text-teal-500 font-black uppercase tracking-widest animate-pulse">Initialisation...</div>;

            const currentData = activeTab === 'dash_month' ? stats.month : stats.year;
            const titleText = activeTab === 'dash_month' ? new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(viewDate) : `Exercice ${viewDate.getFullYear()}`;

            return (
                <div className={`min-h-screen transition-all duration-300 ${isDarkMode ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'}`} style={{ zoom: zoomLevel / 100 }}>
                    
                    {/* PC Header */}
                    <header className={`hidden md:flex sticky top-0 z-50 px-10 h-20 items-center justify-between border-b transition-colors ${isDarkMode ? 'bg-slate-950/90 border-slate-800' : 'bg-white/90 border-slate-200'} backdrop-blur-xl`}>
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-teal-500 rounded-2xl flex items-center justify-center text-slate-950 shadow-lg shadow-teal-500/20"><Icon name="Activity" /></div>
                            <h1 className="text-xl font-black uppercase tracking-tighter">Ak Mindstep</h1>
                        </div>
                        <nav className="flex gap-1 h-full">
                            {NAV_TABS_CONFIG.map(t => (
                                <button key={t.id} onClick={() => {setActiveTab(t.id); setEditingSession(null);}} className={`px-6 h-full text-[10px] font-black uppercase tracking-widest transition-all relative ${activeTab === t.id ? 'text-teal-400' : 'text-slate-500 hover:text-slate-300'}`}>
                                    <div className="flex items-center gap-2"><Icon name={t.icon} size={14}/> {t.label}</div>
                                    {activeTab === t.id && <div className="absolute bottom-0 left-0 right-0 h-1 bg-teal-500 rounded-t-full"/>}
                                </button>
                            ))}
                        </nav>
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-3 rounded-xl border border-slate-800 shadow-sm"><Icon name={isDarkMode ? 'Sun' : 'Moon'} size={18} /></button>
                    </header>

                    <main className="p-4 md:p-10 max-w-6xl mx-auto pb-44">
                        
                        {(activeTab === 'dash_month' || activeTab === 'dash_year') && (
                            <div className="space-y-6 page-transition">
                                <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                    <div className="flex items-center gap-3">
                                        <button onClick={() => handleNav(-1)} className="p-2 bg-slate-900 rounded-xl hover:bg-slate-800 transition-colors"><Icon name="ChevronLeft" /></button>
                                        <h2 className="text-3xl font-black uppercase tracking-tighter">{titleText}</h2>
                                        <button onClick={() => handleNav(1)} className="p-2 bg-slate-900 rounded-xl hover:bg-slate-800 transition-colors"><Icon name="ChevronRight" /></button>
                                    </div>
                                    <button onClick={resetDate} className="px-4 py-2 bg-teal-500/10 text-teal-500 text-[9px] font-black rounded-xl border border-teal-500/20 uppercase tracking-widest">Aujourd'hui</button>
                                </header>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <StatCard isDarkMode={isDarkMode} title="CA Encaissé" value={`${currentData.encaisse.toLocaleString('fr-FR')} €`} subValue={`Sur total ${currentData.total.toLocaleString('fr-FR')}€`} iconName="Wallet" colorClass="bg-teal-600" />
                                    <StatCard isDarkMode={isDarkMode} title="Impayés" value={`${currentData.attendu.toLocaleString('fr-FR')} €`} subValue={`${currentData.items.filter(s=>!s.isPaid).length} séance(s) en attente`} iconName="Clock" colorClass="bg-red-500" />
                                    <StatCard isDarkMode={isDarkMode} title="Tarif Moyen" value={`${currentData.count > 0 ? (currentData.total / currentData.count).toFixed(0) : 0} €`} subValue={`${currentData.count} consultations total`} iconName="TrendingUp" colorClass="bg-teal-600" />
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                    {[
                                        { t: "Services", d: currentData.catData, c: isDarkMode ? COLORS_DARK : COLORS_LIGHT },
                                        { t: "Modalités", d: currentData.modData, c: ['#1e293b', '#2dd4bf'] },
                                        { t: "Paiements", d: currentData.payData, c: isDarkMode ? COLORS_DARK.slice(2) : COLORS_LIGHT.slice(2) }
                                    ].map((chart, i) => (
                                        <div key={i} className={`${isDarkMode ? 'bg-slate-800 border-slate-700 shadow-xl' : 'bg-white border-slate-200 shadow-sm'} p-6 rounded-psy border h-[320px] flex flex-col`}>
                                            <h3 className="text-[9px] font-black uppercase tracking-widest mb-4 opacity-50">{chart.t}</h3>
                                            <div className="flex-1">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart>
                                                        <Pie data={chart.d.filter(x => x.value > 0)} innerRadius={50} outerRadius={75} dataKey="value" stroke="none" label={(p) => renderPieLabel(p, isDarkMode)}>
                                                            {chart.d.map((_, j) => <Cell key={j} fill={chart.c[j % chart.c.length]} />)}
                                                        </Pie>
                                                        <Tooltip contentStyle={{ borderRadius: '15px', border: 'none', backgroundColor: '#0f172a', fontSize: '10px' }} />
                                                        <Legend verticalAlign="bottom" wrapperStyle={{ fontSize: '9px', paddingTop: '15px' }} />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {activeTab === 'dash_year' && (
                                    <div className={`${isDarkMode ? 'bg-slate-900/40 border-slate-800' : 'bg-white border-slate-200'} p-8 rounded-psy border h-[400px] flex flex-col shadow-2xl`}>
                                        <h3 className="text-[9px] font-black uppercase tracking-widest mb-6 opacity-50 text-center">Comparatif Cabinets (€)</h3>
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={stats.comparison}>
                                                <CartesianGrid vertical={false} stroke={isDarkMode ? '#1e293b' : '#f1f5f9'} />
                                                <XAxis dataKey="name" axisLine={false} tick={{fill: isDarkMode ? '#475569' : '#94a3b8', fontSize: 10}} />
                                                <Tooltip contentStyle={{borderRadius: '15px', border: 'none', backgroundColor: '#0f172a'}} />
                                                {cabinets.map((c, i) => <Bar key={c} dataKey={c} fill={i === 0 ? '#2dd4bf' : (isDarkMode ? '#1e293b' : '#e2e8f0')} radius={[5, 5, 0, 0]} barSize={25} />)}
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'add' && (
                            <div className="max-w-lg mx-auto page-transition">
                                <h2 className="text-2xl font-black uppercase tracking-tighter mb-8 text-center">Encoder une séance</h2>
                                <form onSubmit={saveSession} className={`${isDarkMode ? 'bg-slate-900 border-slate-800 shadow-2xl' : 'bg-white border-slate-200 shadow-xl'} p-8 rounded-psy border space-y-6`}>
                                    <div className="grid grid-cols-2 gap-2">
                                        {cabinets.map(c => <button key={c} type="button" onClick={() => setFormData({...formData, cabinet: c})} className={`py-4 rounded-3xl text-[10px] font-black uppercase border-2 transition-all ${formData.cabinet === c ? 'bg-teal-500 border-teal-500 text-slate-950 shadow-lg' : 'border-slate-800 text-slate-500'}`}>{c}</button>)}
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        {categories.map(c => <button key={c} type="button" onClick={() => setFormData({...formData, category: c})} className={`py-4 rounded-3xl text-[8px] font-black uppercase border-2 transition-all ${formData.category === c ? 'bg-teal-500 border-teal-500 text-slate-950' : 'border-slate-800 text-slate-500'}`}>{c}</button>)}
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        {['Présentiel', 'Visio'].map(m => <button key={m} type="button" onClick={() => setFormData({...formData, modality: m})} className={`py-3 rounded-2xl text-[9px] font-black uppercase border transition-all ${formData.modality === m ? 'bg-white text-slate-950' : 'border-slate-800 text-slate-600'}`}>{m}</button>)}
                                    </div>
                                    <input type="text" placeholder="Patient (Nom ou ID)" value={formData.clientName} onChange={e => setFormData({...formData, clientName: e.target.value})} className={`w-full p-5 rounded-3xl bg-transparent border-2 ${isDarkMode ? 'border-slate-800' : 'border-slate-100'} font-black text-xs outline-none focus:border-teal-500 transition-all`} />
                                    <div className="relative">
                                        <span className="absolute left-6 top-1/2 -translate-y-1/2 font-black text-teal-500 text-2xl opacity-40">€</span>
                                        <input type="number" required placeholder="0.00" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className={`w-full py-10 rounded-psy bg-transparent border-2 ${isDarkMode ? 'border-slate-800' : 'border-slate-100'} text-5xl font-black text-center outline-none focus:border-teal-500 transition-all`} />
                                    </div>
                                    <button type="submit" className="w-full py-6 rounded-psy bg-teal-500 text-slate-950 font-black uppercase tracking-[0.2em] shadow-xl hover:bg-teal-400 transition-all">Enregistrer</button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-4 page-transition">
                                <header className="flex justify-between items-center mb-8 px-4">
                                    <h2 className="text-xl font-black uppercase tracking-tighter">Historique complet</h2>
                                    <button onClick={handleExportCSV} className={`p-3 rounded-xl shadow-md ${isDarkMode ? 'bg-slate-900 text-white' : 'bg-white border text-slate-900'}`}><Icon name="FileSpreadsheet" size={18} /></button>
                                </header>
                                {sessions.length === 0 ? <p className="text-center py-20 text-slate-500 font-black uppercase text-[10px]">Aucun enregistrement</p> : sessions.map(s => (
                                    <div key={s.id} className={`${isDarkMode ? 'bg-slate-900/40 border-slate-800' : 'bg-white border-slate-200'} p-6 rounded-psy border flex items-center justify-between shadow-lg`}>
                                        <div className="flex items-center gap-5">
                                            <div className="w-14 h-14 rounded-3xl bg-teal-500/10 flex items-center justify-center text-teal-500"><Icon name={s.category === 'Couple' ? 'Users' : 'User'} size={24} /></div>
                                            <div>
                                                <p className={`text-xs font-black uppercase ${s.isCancellation ? 'text-orange-500' : ''}`}>{s.category} {s.isCancellation && <span className="text-[10px] italic">- Annulé</span>}</p>
                                                <p className="text-[10px] font-bold opacity-30 uppercase tracking-widest mt-1">{new Date(s.date).toLocaleDateString('fr-FR', {day:'2-digit', month:'short'})} • {s.cabinet}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className="text-right">
                                                <p className="text-xl font-black tracking-tighter">{s.amount}€</p>
                                                <button onClick={() => setSessions(sessions.map(x => x.id === s.id ? { ...x, isPaid: !x.isPaid } : x))} className={`text-[7px] font-black uppercase px-2 py-0.5 rounded-full ${s.isPaid ? 'bg-teal-500/10 text-teal-500 border border-teal-500/20' : 'bg-red-500 text-white'}`}>{s.isPaid ? 'Payé' : 'À payer'}</button>
                                            </div>
                                            <div className="flex flex-col gap-1">
                                                <button onClick={() => { setFormData({...s, amount: s.amount.toString()}); setEditingSession(s); }} className="p-2 hover:bg-slate-800 rounded-lg text-slate-500 hover:text-teal-400 transition-colors"><Icon name="Edit2" size={14}/></button>
                                                <button onClick={() => setDeleteId(s.id)} className="p-2 hover:bg-red-500/10 rounded-lg text-slate-500 hover:text-red-500 transition-colors"><Icon name="Trash2" size={14}/></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="max-w-lg mx-auto space-y-6 page-transition">
                                <h2 className="text-xl font-black uppercase tracking-tighter mb-8 text-center">Configuration</h2>
                                <div className={`${isDarkMode ? 'bg-slate-900/40 border-slate-800' : 'bg-white border-slate-200'} p-8 rounded-psy border space-y-8 shadow-xl`}>
                                    <div className="flex items-center justify-between">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-slate-500">Thème Sombre</label>
                                        <button onClick={() => setIsDarkMode(!isDarkMode)} className={`w-14 h-8 rounded-full transition-all relative ${isDarkMode ? 'bg-teal-500' : 'bg-slate-200'}`}><div className={`absolute top-1 w-6 h-6 rounded-full bg-white shadow-sm transition-all ${isDarkMode ? 'left-7' : 'left-1'}`} /></button>
                                    </div>
                                    <div className="space-y-4 pt-4 border-t border-slate-800/20">
                                        <p className="text-[10px] font-black uppercase tracking-widest text-slate-500">Interface Zoom</p>
                                        <div className="flex justify-between items-center"><input type="range" min="80" max="150" value={zoomLevel} onChange={e => setZoomLevel(parseInt(e.target.value))} className="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-teal-500 mr-4" /><span className="text-teal-500 font-black text-xs">{zoomLevel}%</span></div>
                                    </div>
                                    <div className="space-y-4 pt-4 border-t border-slate-800/20">
                                        <p className="text-[10px] font-black uppercase tracking-widest text-slate-500">Cabinets enregistrés</p>
                                        <div className="flex gap-2 flex-wrap">{cabinets.map((c,i) => <span key={i} className="px-3 py-1 bg-teal-500/10 border border-teal-500/20 text-teal-500 rounded-full text-[9px] font-black uppercase">{c}</span>)}</div>
                                        <button onClick={() => setCabinets([...cabinets, 'Nouveau'])} className="w-full py-4 rounded-2xl bg-slate-950 border border-slate-800 text-[10px] font-black uppercase tracking-widest hover:border-teal-500 transition-all text-slate-400 mt-2">Ajouter un cabinet</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Mobile Basse */}
                    <nav className={`md:hidden fixed bottom-0 left-0 right-0 h-28 backdrop-blur-3xl border-t flex items-center justify-around px-6 z-50 transition-all ${isDarkMode ? 'bg-slate-950/95 border-slate-900' : 'bg-white/95 border-slate-200 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]'}`}>
                        {NAV_TABS_CONFIG.map(item => (
                            <button key={item.id} onClick={() => {setActiveTab(item.id); setEditingSession(null);}} className={`flex flex-col items-center gap-2 transition-all ${activeTab === item.id ? 'text-teal-400 scale-110 font-black' : 'text-slate-600 opacity-60'}`}>
                                <div className={`p-2 rounded-2xl ${activeTab === item.id ? 'bg-teal-500/10' : ''}`}><Icon name={item.icon} size={24} /></div>
                                <span className="text-[7px] font-black uppercase tracking-widest">{item.label}</span>
                            </button>
                        ))}
                    </nav>

                    {/* Modales Overlay */}
                    {editingSession && (
                        <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[100] flex items-center justify-center p-4">
                            <div className="w-full max-w-lg max-h-[90vh] overflow-y-auto no-scrollbar animate-in zoom-in">
                                <div className="flex justify-between items-center mb-6 px-4"><h2 className="text-xl font-black uppercase tracking-tighter">Modification</h2><button onClick={() => setEditingSession(null)} className="p-3 bg-slate-900 rounded-full hover:bg-slate-800 transition-colors"><Icon name="X" /></button></div>
                                <form onSubmit={handleUpdate} className="bg-slate-900 border border-slate-800 p-8 rounded-psy space-y-6 shadow-2xl">
                                    <input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 text-xs font-black outline-none focus:border-teal-500" />
                                    <input type="text" placeholder="Patient" value={formData.clientName} onChange={e => setFormData({...formData, clientName: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 text-xs font-black outline-none focus:border-teal-500" />
                                    <div className="grid grid-cols-2 gap-2"><button type="button" onClick={() => setFormData({...formData, isPaid: !formData.isPaid})} className={`py-4 rounded-2xl text-[10px] font-black uppercase border ${formData.isPaid ? 'bg-teal-500 text-slate-950' : 'border-red-500 text-red-500'}`}>{formData.isPaid ? 'Payé' : 'À payer'}</button><button type="button" onClick={() => setFormData({...formData, isCancellation: !formData.isCancellation})} className={`py-4 rounded-2xl text-[10px] font-black uppercase border ${formData.isCancellation ? 'bg-orange-500 text-white' : 'border-slate-800 text-slate-500'}`}>Annulation</button></div>
                                    <div className="relative"><span className="absolute left-6 top-1/2 -translate-y-1/2 font-black text-teal-500 text-2xl opacity-40">€</span><input type="number" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="w-full py-8 rounded-psy bg-slate-950 border-2 border-slate-800 text-4xl font-black text-center outline-none focus:border-teal-500" /></div>
                                    <button type="submit" className="w-full py-6 rounded-psy bg-teal-500 text-slate-950 font-black uppercase tracking-[0.2em]">Sauvegarder</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {deleteId && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-slate-900 border border-slate-800 p-8 rounded-psy w-full max-w-xs text-center space-y-6 shadow-2xl">
                                <div className="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto"><Icon name="AlertCircle" size={32} /></div>
                                <h3 className="font-black uppercase tracking-tighter">Supprimer ?</h3>
                                <div className="flex gap-2"><button onClick={() => setDeleteId(null)} className="flex-1 py-4 rounded-2xl bg-slate-800 text-[10px] font-black uppercase">Non</button><button onClick={() => { setSessions(sessions.filter(s => s.id !== deleteId)); setDeleteId(null); }} className="flex-1 py-4 rounded-2xl bg-red-600 text-white text-[10px] font-black uppercase shadow-lg">Oui</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
