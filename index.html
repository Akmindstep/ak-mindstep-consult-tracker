<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ak Mindstep Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDV_kmvQC6yAtA95efs33S17SiYopp0r2c",
            authDomain: "ak-minstep-consult-tracker.firebaseapp.com",
            projectId: "ak-minstep-consult-tracker",
            storageBucket: "ak-minstep-consult-tracker.firebasestorage.app",
            messagingSenderId: "1076236018116",
            appId: "1:1076236018116:web:9fdfdddede40fea2528491"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.api = { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc };
        const auth = getAuth(app);
        signInAnonymously(auth).then(() => { window.isAuth = true; });
    </script>
</head>
<body class="bg-slate-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { LayoutDashboard, History, TrendingUp, Plus, Trash2, MapPin, X } = lucide;

        const App = () => {
            const [ready, setReady] = useState(false);
            const [activeTab, setActiveTab] = useState('dash');
            const [sessions, setSessions] = useState([]);
            const [formData, setFormData] = useState({ amount: '', cabinet: 'Koekelberg', category: 'Individuelle' });

            useEffect(() => {
                const init = setInterval(() => {
                    if (window.isAuth) {
                        clearInterval(init);
                        const q = window.api.query(window.api.collection(window.db, "sessions"), window.api.orderBy("date", "desc"));
                        window.api.onSnapshot(q, (snapshot) => {
                            setSessions(snapshot.docs.map(d => ({id: d.id, ...d.data()})));
                            setReady(true);
                            setTimeout(() => lucide.createIcons(), 100);
                        });
                    }
                }, 500);
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.amount) return;
                await window.api.addDoc(window.api.collection(window.db, "sessions"), {
                    ...formData,
                    amount: parseFloat(formData.amount),
                    date: new Date().toISOString()
                });
                setFormData({ ...formData, amount: '' });
                setActiveTab('dash');
            };

            const totalCA = sessions.reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0);

            if (!ready) return <div className="h-screen flex items-center justify-center font-black uppercase tracking-widest animate-pulse">Chargement Ak Mindstep...</div>;

            return (
                <div className="min-h-screen pb-24">
                    <header className="p-6 flex justify-between items-center border-b border-white/5 bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-teal-500 rounded-lg shadow-lg shadow-teal-500/20"><TrendingUp size={18}/></div>
                            <h1 className="font-black uppercase italic tracking-tighter text-lg">Ak Mindstep</h1>
                        </div>
                    </header>

                    <main className="p-6 max-w-2xl mx-auto">
                        {activeTab === 'dash' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-slate-900 p-8 rounded-[2.5rem] border border-white/5 shadow-2xl">
                                    <p className="text-[10px] font-black uppercase text-slate-500 mb-2 tracking-widest text-center">Chiffre d'Affaires Global</p>
                                    <p className="text-5xl font-black text-center text-teal-400">{totalCA.toLocaleString()} €</p>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-slate-900/50 p-6 rounded-[2rem] border border-white/5">
                                        <p className="text-[9px] font-black uppercase text-slate-500 mb-1">Séances</p>
                                        <p className="text-2xl font-black">{sessions.length}</p>
                                    </div>
                                    <div className="bg-slate-900/50 p-6 rounded-[2rem] border border-white/5">
                                        <p className="text-[9px] font-black uppercase text-slate-500 mb-1">Dernier</p>
                                        <p className="text-2xl font-black text-teal-400">+{sessions[0]?.amount || 0}€</p>
                                    </div>
                                </div>

                                <div className="pt-4">
                                    <h2 className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-2 mb-4">Dernières consultations</h2>
                                    <div className="space-y-3">
                                        {sessions.slice(0, 5).map(s => (
                                            <div key={s.id} className="bg-slate-900/80 p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                                                <div className="flex flex-col">
                                                    <span className="text-[10px] font-black uppercase tracking-tight">{s.category}</span>
                                                    <span className="text-[8px] font-bold text-slate-500 uppercase tracking-widest">{s.cabinet}</span>
                                                </div>
                                                <span className="font-black text-teal-400">+{s.amount} €</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'add' && (
                            <div className="animate-in slide-in-from-bottom-8">
                                <form onSubmit={handleSubmit} className="space-y-8">
                                    <h2 className="text-3xl font-black uppercase italic tracking-tighter">Nouvel Encodage</h2>
                                    
                                    <div className="space-y-6">
                                        <div>
                                            <label className="text-[9px] font-black uppercase text-slate-500 ml-2 mb-3 block">Choisir le Cabinet</label>
                                            <div className="grid grid-cols-2 gap-2">
                                                {['Koekelberg', 'Bruxelles-Sud'].map(c => (
                                                    <button key={c} type="button" onClick={() => setFormData({...formData, cabinet: c})} className={`p-4 rounded-2xl font-black text-[10px] uppercase border transition-all ${formData.cabinet === c ? 'bg-white text-slate-950 border-white' : 'bg-slate-900 text-slate-500 border-white/5'}`}>{c}</button>
                                                ))}
                                            </div>
                                        </div>

                                        <div>
                                            <label className="text-[9px] font-black uppercase text-slate-500 ml-2 mb-3 block">Type de Séance</label>
                                            <div className="grid grid-cols-3 gap-2">
                                                {['Individuelle', 'Couple', 'Famille'].map(s => (
                                                    <button key={s} type="button" onClick={() => setFormData({...formData, category: s})} className={`p-3 rounded-2xl font-black text-[8px] uppercase border transition-all ${formData.category === s ? 'bg-teal-500 text-white border-teal-500' : 'bg-slate-900 text-slate-500 border-white/5'}`}>{s}</button>
                                                ))}
                                            </div>
                                        </div>

                                        <div>
                                            <label className="text-[9px] font-black uppercase text-slate-500 ml-2 mb-3 block">Honoraires (€)</label>
                                            <input type="number" step="0.01" value={formData.amount} onChange={(e) => setFormData({...formData, amount: e.target.value})} className="w-full bg-slate-900 border-2 border-white/5 rounded-3xl p-6 text-4xl font-black text-teal-400 outline-none focus:border-teal-500 transition-all" placeholder="0.00"/>
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-white text-slate-950 p-6 rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-2xl">Enregistrer la séance</button>
                                    <button type="button" onClick={() => setActiveTab('dash')} className="w-full text-slate-500 font-black uppercase text-[10px] tracking-widest">Retour</button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-4 animate-in fade-in">
                                <h2 className="text-xl font-black uppercase mb-6 ml-2 tracking-widest">Historique complet</h2>
                                {sessions.map(s => (
                                    <div key={s.id} className="bg-slate-900/50 p-4 rounded-2xl border border-white/5 flex justify-between items-center group">
                                        <div>
                                            <p className="text-[10px] font-black uppercase tracking-tight">{s.category}</p>
                                            <p className="text-[8px] font-bold text-slate-500 uppercase tracking-widest">{new Date(s.date).toLocaleDateString()} • {s.cabinet}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="font-black text-teal-400">+{s.amount} €</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-6 right-6 h-20 bg-slate-900/80 backdrop-blur-2xl rounded-[2.5rem] border border-white/5 flex justify-around items-center px-4 shadow-2xl z-50">
                        <button onClick={() => setActiveTab('dash')} className={`p-4 rounded-2xl transition-all ${activeTab === 'dash' ? 'bg-teal-500 text-white shadow-lg shadow-teal-500/20' : 'text-slate-500'}`}><LayoutDashboard size={20}/></button>
                        <button onClick={() => setActiveTab('add')} className="w-16 h-16 bg-white rounded-full flex items-center justify-center -mt-16 shadow-2xl border-4 border-slate-950 hover:scale-110 transition-transform"><Plus size={28} className="text-slate-950"/></button>
                        <button onClick={() => setActiveTab('history')} className={`p-4 rounded-2xl transition-all ${activeTab === 'history' ? 'bg-teal-500 text-white shadow-lg shadow-teal-500/20' : 'text-slate-500'}`}><History size={20}/></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
