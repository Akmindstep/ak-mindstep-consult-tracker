<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ak Mindstep Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDV_kmvQC6yAtA95efs33S17SiYopp0r2c",
            authDomain: "ak-minstep-consult-tracker.firebaseapp.com",
            projectId: "ak-minstep-consult-tracker",
            storageBucket: "ak-minstep-consult-tracker.firebasestorage.app",
            messagingSenderId: "1076236018116",
            appId: "1:1076236018116:web:9fdfdddede40fea2528491"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.api = { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc };
        const auth = getAuth(app);
        signInAnonymously(auth).then(() => { window.isAuth = true; });
    </script>
</head>
<body class="bg-slate-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, XAxis, Tooltip, ResponsiveContainer, Cell } = window.Recharts;

        const App = () => {
            const [ready, setReady] = useState(false);
            const [tab, setTab] = useState('dash');
            const [sessions, setSessions] = useState([]);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [formData, setFormData] = useState({ 
                amount: '', 
                cabinet: 'Koekelberg', 
                category: 'Individuelle',
                modality: 'Présentiel',
                isPaid: true
            });

            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.isAuth && window.db && window.Recharts) {
                        clearInterval(interval);
                        const q = window.api.query(window.api.collection(window.db, "sessions"), window.api.orderBy("date", "desc"));
                        window.api.onSnapshot(q, (snapshot) => {
                            setSessions(snapshot.docs.map(d => ({id: d.id, ...d.data()})));
                            setReady(true);
                            setTimeout(() => lucide.createIcons(), 100);
                        });
                    }
                }, 500);
            }, []);

            const save = async (e) => {
                e.preventDefault();
                if(!formData.amount) return;
                await window.api.addDoc(window.api.collection(window.db, "sessions"), {
                    ...formData,
                    amount: parseFloat(formData.amount),
                    date: new Date().toISOString()
                });
                setFormData({ ...formData, amount: '' });
                setTab('dash');
            };

            const deleteSession = async (id) => {
                if(confirm("Supprimer cette séance ?")) {
                    await window.api.deleteDoc(window.api.doc(window.db, "sessions", id));
                }
            };

            const total = sessions.reduce((acc, s) => acc + (s.amount || 0), 0);
            
            const chartData = useMemo(() => {
                return [...new Array(7)].map((_, i) => {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const dayAmount = sessions
                        .filter(s => new Date(s.date).toDateString() === d.toDateString())
                        .reduce((acc, s) => acc + s.amount, 0);
                    return { name: d.toLocaleDateString('fr', {day:'2-digit'}), amount: dayAmount };
                }).reverse();
            }, [sessions]);

            if (!ready) return <div className="h-screen flex items-center justify-center font-black uppercase tracking-[0.3em] animate-pulse">Sync Ak Mindstep...</div>;

            return (
                <div className={`max-w-md mx-auto min-h-screen flex flex-col p-6 pb-32 transition-colors ${isDarkMode ? 'bg-slate-950 text-white' : 'bg-slate-50 text-slate-900'}`}>
                    <header className="mb-8 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-teal-500 rounded-lg"><i data-lucide="trending-up" className="text-white w-5 h-5"></i></div>
                            <h1 className="text-xl font-black uppercase italic tracking-tighter">Ak Mindstep</h1>
                        </div>
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 opacity-50">
                            {isDarkMode ? <i data-lucide="sun"></i> : <i data-lucide="moon"></i>}
                        </button>
                    </header>

                    {tab === 'dash' && (
                        <div className="space-y-6 animate-in fade-in">
                            <div className={`${isDarkMode ? 'bg-slate-900' : 'bg-white shadow-xl'} p-8 rounded-[2.5rem] border ${isDarkMode ? 'border-white/5' : 'border-slate-100'} text-center`}>
                                <p className="text-[10px] font-bold uppercase text-slate-500 mb-2 tracking-widest">Total Chiffre d'Affaires</p>
                                <p className="text-5xl font-black text-teal-500">{total.toLocaleString()} €</p>
                            </div>

                            <div className={`${isDarkMode ? 'bg-slate-900/50' : 'bg-white shadow-md'} p-6 rounded-[2.5rem] border ${isDarkMode ? 'border-white/5' : 'border-slate-100'} h-48`}>
                                <p className="text-[9px] font-black uppercase text-slate-500 mb-4 tracking-widest text-center">Activité 7 jours</p>
                                <ResponsiveContainer width="100%" height="80%">
                                    <BarChart data={chartData}>
                                        <Bar dataKey="amount" fill="#14b8a6" radius={[4, 4, 0, 0]} />
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                            
                            <div className="space-y-3">
                                <h2 className="text-[10px] font-bold uppercase text-slate-500 ml-2 tracking-widest">Derniers Encodages</h2>
                                {sessions.slice(0, 3).map(s => (
                                    <div key={s.id} className={`${isDarkMode ? 'bg-slate-900/50' : 'bg-white shadow-sm'} p-4 rounded-2xl flex justify-between items-center border ${isDarkMode ? 'border-white/5' : 'border-slate-100'}`}>
                                        <div className="flex flex-col">
                                            <span className="text-[10px] font-black uppercase tracking-tight">{s.category}</span>
                                            <span className="text-[8px] font-bold text-slate-500 uppercase tracking-widest">{s.cabinet}</span>
                                        </div>
                                        <div className="font-black text-teal-500">+{s.amount} €</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {tab === 'add' && (
                        <form onSubmit={save} className="space-y-6 animate-in slide-in-from-bottom-4">
                            <h2 className="text-2xl font-black uppercase italic tracking-tighter">Nouvelle Séance</h2>
                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-2">
                                    {['Koekelberg', 'Bruxelles-Sud'].map(c => (
                                        <button key={c} type="button" onClick={() => setFormData({...formData, cabinet: c})} className={`p-4 rounded-2xl text-[10px] font-bold uppercase border transition-all ${formData.cabinet === c ? 'bg-teal-500 text-white' : (isDarkMode ? 'bg-slate-900 border-white/5' : 'bg-slate-100 border-slate-200')}`}>{c}</button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    {['Individuelle', 'Couple', 'Famille'].map(cat => (
                                        <button key={cat} type="button" onClick={() => setFormData({...formData, category: cat})} className={`p-3 rounded-2xl text-[8px] font-bold uppercase border transition-all ${formData.category === cat ? 'bg-slate-500 text-white' : (isDarkMode ? 'bg-slate-900 border-white/5' : 'bg-slate-100 border-slate-200')}`}>{cat}</button>
                                    ))}
                                </div>
                                <input type="number" step="0.01" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} placeholder="Montant €" className={`w-full ${isDarkMode ? 'bg-slate-900 text-teal-400' : 'bg-slate-100 text-teal-600'} p-6 rounded-3xl text-4xl font-black outline-none border-2 border-transparent focus:border-teal-500`} />
                            </div>
                            <button type="submit" className="w-full bg-teal-500 text-white p-6 rounded-[2rem] font-black uppercase tracking-widest shadow-xl shadow-teal-500/20">Enregistrer</button>
                            <button type="button" onClick={() => setTab('dash')} className="w-full text-slate-500 font-bold uppercase text-[10px] tracking-widest">Annuler</button>
                        </form>
                    )}

                    {tab === 'history' && (
                        <div className="space-y-4 animate-in fade-in">
                            <h2 className="text-xl font-black uppercase tracking-widest mb-6">Historique</h2>
                            {sessions.map(s => (
                                <div key={s.id} className={`${isDarkMode ? 'bg-slate-900/50' : 'bg-white'} p-5 rounded-2xl flex justify-between items-center border ${isDarkMode ? 'border-white/5' : 'border-slate-100'}`}>
                                    <div>
                                        <p className="text-[10px] font-black uppercase">{s.category}</p>
                                        <p className="text-[8px] font-bold text-slate-500 uppercase tracking-widest">{new Date(s.date).toLocaleDateString()} • {s.cabinet}</p>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <span className="font-black text-teal-500">+{s.amount}€</span>
                                        <button onClick={() => deleteSession(s.id)} className="text-red-500/40 hover:text-red-500 transition-colors">
                                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    <nav className={`fixed bottom-6 left-6 right-6 h-20 ${isDarkMode ? 'bg-slate-900' : 'bg-white shadow-2xl'} rounded-[2.5rem] border ${isDarkMode ? 'border-white/10' : 'border-slate-100'} flex justify-around items-center px-4 z-50`}>
                        <button onClick={() => setTab('dash')} className={`p-4 transition-all ${tab === 'dash' ? 'text-teal-500' : 'text-slate-500'}`}><i data-lucide="layout-dashboard"></i></button>
                        <button onClick={() => setTab('add')} className="w-16 h-16 bg-teal-500 rounded-full flex items-center justify-center -mt-16 border-4 border-slate-950 shadow-xl shadow-teal-500/20 hover:scale-110 transition-transform"><i data-lucide="plus" className="text-white"></i></button>
                        <button onClick={() => setTab('history')} className={`p-4 transition-all ${tab === 'history' ? 'text-teal-500' : 'text-slate-500'}`}><i data-lucide="history"></i></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
