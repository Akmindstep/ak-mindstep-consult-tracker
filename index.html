<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ak Mindstep Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDV_kmvQC6yAtA95efs33S17SiYopp0r2c",
            authDomain: "ak-minstep-consult-tracker.firebaseapp.com",
            projectId: "ak-minstep-consult-tracker",
            storageBucket: "ak-minstep-consult-tracker.firebasestorage.app",
            messagingSenderId: "1076236018116",
            appId: "1:1076236018116:web:9fdfdddede40fea2528491"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.api = { collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, updateDoc, signInAnonymously };
        window.FirebaseReady = true;
    </script>
</head>
<body class="bg-slate-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isLoaded, setIsLoaded] = useState(false);
            const [user, setUser] = useState(null);

            useEffect(() => {
                const timer = setInterval(() => {
                    // On vérifie que TOUT est chargé avant de dire "OK"
                    if (window.Recharts && window.lucide && window.FirebaseReady) {
                        window.api.signInAnonymously(window.auth).then(res => {
                            setUser(res.user);
                            setIsLoaded(true);
                            clearInterval(timer);
                            setTimeout(() => window.lucide.createIcons(), 100);
                        });
                    }
                }, 500);
                return () => clearInterval(timer);
            }, []);

            if (!isLoaded) return (
                <div className="h-screen flex flex-col items-center justify-center">
                    <div className="w-12 h-12 border-4 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
                    <p className="mt-4 text-[10px] font-black uppercase tracking-widest opacity-50">Synchronisation finale...</p>
                </div>
            );

            return (
                <div className="min-h-screen p-6 md:p-12 animate-in fade-in duration-700">
                    <header className="flex justify-between items-center mb-10">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-teal-500 rounded-2xl shadow-lg"><i data-lucide="trending-up"></i></div>
                            <h1 className="text-2xl font-black uppercase italic tracking-tighter">Ak Mindstep</h1>
                        </div>
                        <div className="bg-slate-900 px-4 py-2 rounded-full text-[10px] font-bold border border-white/5">
                            ID: {user.uid.substring(0,8)}
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-slate-900 p-8 rounded-[2.5rem] border border-white/5">
                            <p className="text-[10px] font-black uppercase text-slate-500 mb-2 tracking-widest">Chiffre d'Affaires</p>
                            <p className="text-4xl font-black">0,00 €</p>
                        </div>
                        <button className="bg-white text-slate-950 p-8 rounded-[2.5rem] flex items-center justify-center gap-4 font-black uppercase text-xs hover:bg-teal-400 transition-all">
                            <i data-lucide="plus"></i> Nouvelle Consultation
                        </button>
                    </div>

                    <div className="mt-10 p-20 bg-slate-900/30 rounded-[3rem] border-2 border-dashed border-white/5 text-center">
                        <p className="text-slate-500 font-black uppercase text-[10px] tracking-widest">L'application est publiée et fonctionnelle !</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
