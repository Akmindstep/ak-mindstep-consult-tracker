<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ak Mindstep | consult tracker</title>
    
    <!-- Dépendances -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --rounded-psy: 1.5rem; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .rounded-psy { border-radius: var(--rounded-psy); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-progress { animation: progress 2s ease-in-out infinite; }
        @keyframes progress { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
    </script>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyDV_kmvQC6yAtA95efs33S17SiYopp0r2c",
            authDomain: "ak-minstep-consult-tracker.firebaseapp.com",
            projectId: "ak-minstep-consult-tracker",
            storageBucket: "ak-minstep-consult-tracker.firebasestorage.app",
            messagingSenderId: "1076236018116",
            appId: "1:1076236018116:web:9fdfdddede40fea2528491"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);
        const appIdGlobal = 'ak-mindstep-prod';

        // --- CONSTANTES ---
        const NAV_TABS = [
            { id: 'dash_month', label: 'Mensuel', icon: 'Calendar' },
            { id: 'dash_year', label: 'Annuel', icon: 'BarChart3' },
            { id: 'history', label: 'Journal', icon: 'BookOpen' },
            { id: 'settings', label: 'Réglages', icon: 'Settings' }
        ];

        const COLORS_DARK = ['#2dd4bf', '#818cf8', '#fbbf24', '#f43f5e', '#a855f7', '#22d3ee'];

        // --- COMPOSANTS UI ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconNode = window.lucide?.icons[name];
            return iconNode ? (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}
                    dangerouslySetInnerHTML={{ __html: iconNode.map(tag => `<${tag[0]} ${Object.entries(tag[1]).map(([k, v]) => `${k}="${v}"`).join(' ')}></${tag[0]}>`).join('') }}
                />
            ) : null;
        };

        const StatCard = ({ title, value, subValue, iconName, colorClass, highlight, children }) => (
            <div className={`p-5 rounded-2xl border transition-all relative overflow-hidden ${highlight ? 'bg-teal-950/20 border-teal-500/40' : 'bg-slate-900 border-slate-800 shadow-xl'}`}>
                <div className="flex items-center justify-between mb-2">
                    <span className="text-[9px] font-black uppercase tracking-widest text-slate-500">{title}</span>
                    <div className={`w-7 h-7 rounded-lg ${colorClass} bg-opacity-20 flex items-center justify-center`}><Icon name={iconName} size={14} className={colorClass.replace('bg-', 'text-')} /></div>
                </div>
                <div className="text-2xl font-black tracking-tight">{value}</div>
                <div className="text-[10px] font-bold text-slate-400 mt-1">{subValue}</div>
                {children}
            </div>
        );

        function App() {
            const [user, setUser] = React.useState(null);
            const [libsReady, setLibsReady] = React.useState(false);
            const [sessions, setSessions] = React.useState([]);
            const [inamiReceipts, setInamiReceipts] = React.useState({});
            const [loading, setLoading] = React.useState(true);
            const [activeTab, setActiveTab] = React.useState('dash_month');
            const [viewDate, setViewDate] = React.useState(new Date());
            const [filterCabinet, setFilterCabinet] = React.useState('Tous');
            const [isDarkMode, setIsDarkMode] = React.useState(true);

            const cabinets = ['Koekelberg', 'Bruxelles-Sud'];
            const categories = ['Individuelle', 'Couple', 'Familiale'];
            
            const [formData, setFormData] = React.useState({
                amount: '', cabinet: 'Koekelberg', category: 'Individuelle',
                date: new Date().toISOString().split('T')[0], modality: 'Présentiel',
                paymentMethod: 'Virement bancaire', isPaid: true, isCancellation: false, clientName: '', notes: ''
            });

            // Initialisation
            React.useEffect(() => {
                const check = setInterval(() => { if (window.lucide && window.Recharts?.ResponsiveContainer) { setLibsReady(true); clearInterval(check); } }, 500);
                const unsubAuth = onAuthStateChanged(auth, (u) => { if (u) setUser(u); else signInAnonymously(auth); });
                return () => { clearInterval(check); unsubAuth(); };
            }, []);

            React.useEffect(() => {
                if (!user) return;
                const unsubSessions = onSnapshot(collection(db, 'artifacts', appIdGlobal, 'public', 'data', 'sessions'), (snap) => {
                    setSessions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                });
                const unsubInami = onSnapshot(collection(db, 'artifacts', appIdGlobal, 'public', 'data', 'inami_received'), (snap) => {
                    const data = {};
                    snap.docs.forEach(d => data[d.id] = d.data().amount || 0);
                    setInamiReceipts(data);
                });
                return () => { unsubSessions(); unsubInami(); };
            }, [user]);

            // --- CALCULS ---
            const stats = React.useMemo(() => {
                const selMonth = viewDate.getMonth();
                const selYear = viewDate.getFullYear();
                const monthKey = `${selYear}-${(selMonth + 1).toString().padStart(2, '0')}`;

                const currentSessions = sessions.filter(s => s.date.startsWith(monthKey) && (filterCabinet === 'Tous' || s.cabinet === filterCabinet));

                const manualInami = inamiReceipts[monthKey] || 0;
                const paidDirect = currentSessions.filter(s => s.paymentMethod !== 'INAMI' && s.isPaid).reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0);
                const unpaid = currentSessions.filter(s => !s.isPaid).reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0);

                return {
                    caActé: currentSessions.reduce((acc, s) => acc + (parseFloat(s.amount) || 0), 0),
                    enBanque: Math.round((paidDirect + manualInami) * 100) / 100,
                    enAttente: Math.round(unpaid * 100) / 100,
                    manualInami,
                    monthKey,
                    count: currentSessions.length,
                    catData: categories.map(c => ({ name: c, value: currentSessions.filter(s => s.category === c).length })),
                    modData: [{ name: 'Présentiel', value: currentSessions.filter(s => s.modality === 'Présentiel').length }, { name: 'Visio', value: currentSessions.filter(s => s.modality === 'Visio').length }],
                    payData: [
                        { name: 'Virement/Espèces', value: paidDirect },
                        { name: 'Saisie INAMI', value: manualInami }
                    ]
                };
            }, [sessions, viewDate, filterCabinet, inamiReceipts]);

            const groupedWeeks = React.useMemo(() => {
                const prefix = `${viewDate.getFullYear()}-${(viewDate.getMonth() + 1).toString().padStart(2, '0')}`;
                const res = { "Semaine 1": [], "Semaine 2": [], "Semaine 3": [], "Semaine 4": [], "Semaine 5": [] };
                sessions.filter(s => s.date.startsWith(prefix)).sort((a, b) => b.date.localeCompare(a.date)).forEach(s => {
                    const day = parseInt(s.date.split('-')[2]);
                    if (day <= 7) res["Semaine 1"].push(s);
                    else if (day <= 14) res["Semaine 2"].push(s);
                    else if (day <= 21) res["Semaine 3"].push(s);
                    else if (day <= 28) res["Semaine 4"].push(s);
                    else res["Semaine 5"].push(s);
                });
                return res;
            }, [sessions, viewDate]);

            // --- ACTIONS ---
            const saveManualInami = async (val) => {
                await setDoc(doc(db, 'artifacts', appIdGlobal, 'public', 'data', 'inami_received', stats.monthKey), { amount: parseFloat(val) || 0 });
            };

            const togglePaid = async (s) => {
                await updateDoc(doc(db, 'artifacts', appIdGlobal, 'public', 'data', 'sessions', s.id), { isPaid: !s.isPaid });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                await addDoc(collection(db, 'artifacts', appIdGlobal, 'public', 'data', 'sessions'), { ...formData, amount: parseFloat(formData.amount), createdAt: new Date().toISOString() });
                setFormData({ ...formData, amount: '', clientName: '', notes: '', isCancellation: false });
                setActiveTab('history');
            };

            const deleteSession = async (id) => {
                if (window.confirm("Supprimer cette séance ?")) {
                    await deleteDoc(doc(db, 'artifacts', appIdGlobal, 'public', 'data', 'sessions', id));
                }
            };

            if (loading || !libsReady) return (
                <div className="h-screen flex flex-col items-center justify-center p-10 bg-slate-950">
                    <div className="w-12 h-1 bg-slate-800 rounded-full overflow-hidden mb-4"><div className="w-full h-full bg-teal-500 animate-progress origin-left"></div></div>
                    <p className="text-[10px] font-black uppercase tracking-widest text-teal-500">Sync Ak Mindstep...</p>
                </div>
            );

            const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip, Legend } = window.Recharts;
            const monthLabel = new Intl.DateTimeFormat('fr-FR', {month:'long', year:'numeric'}).format(viewDate);

            return (
                <div className={`min-h-screen pb-32 transition-colors ${isDarkMode ? 'bg-slate-950' : 'bg-slate-50 text-slate-900'}`}>
                    
                    <header className="hidden md:flex sticky top-0 z-50 px-10 h-20 items-center justify-between border-b border-slate-800 bg-slate-950/80 backdrop-blur-md">
                        <div className="flex items-center gap-3"><div className="p-2 bg-teal-500 rounded-lg text-slate-950"><Icon name="Activity" /></div><h1 className="font-black uppercase tracking-tighter">Ak Mindstep</h1></div>
                        <nav className="flex h-full">{NAV_TABS.map(t => <button key={t.id} onClick={() => setActiveTab(t.id)} className={`px-6 h-full text-[10px] font-black uppercase tracking-widest ${activeTab === t.id ? 'text-teal-500' : 'text-slate-500'}`}>{t.label}</button>)}</nav>
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 border border-slate-800 rounded-xl"><Icon name={isDarkMode ? 'Sun' : 'Moon'} /></button>
                    </header>

                    <button onClick={() => setActiveTab('add')} className="fixed z-[60] bottom-28 right-6 md:bottom-10 md:right-10 w-16 h-16 rounded-full bg-teal-500 shadow-2xl flex items-center justify-center text-slate-950"><Icon name="Plus" size={32} /></button>

                    <main className="p-4 md:p-10 max-w-6xl mx-auto space-y-8">
                        {activeTab === 'dash_month' && (
                            <div className="space-y-6 page-transition">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                    <div className="flex items-center gap-3"><button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1))} className="p-2 rounded-xl bg-slate-900 border border-slate-800"><Icon name="ChevronLeft" /></button><h2 className="text-2xl font-black uppercase tracking-tighter">{monthLabel}</h2><button onClick={() => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1))} className="p-2 rounded-xl bg-slate-900 border border-slate-800"><Icon name="ChevronRight" /></button></div>
                                    <select value={filterCabinet} onChange={e => setFilterCabinet(e.target.value)} className="bg-slate-900 border border-slate-800 p-2.5 rounded-xl text-[10px] font-black uppercase outline-none">{['Tous', ...cabinets].map(c => <option key={c} value={c}>{c}</option>)}</select>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <StatCard title="CA Acté (Travail)" value={`${stats.caActé.toLocaleString()}€`} subValue="Volume total encodé ce mois" iconName="Activity" colorClass="bg-slate-600" />
                                    
                                    <StatCard title="En Banque (Réel)" value={`${stats.enBanque.toLocaleString()}€`} subValue="Argent réellement reçu" iconName="Banknote" colorClass="bg-teal-600" highlight={true}>
                                        <div className="mt-4 pt-4 border-t border-slate-800/60">
                                            <label className="text-[8px] font-black uppercase text-slate-500 block mb-2">Virement Mutuelle reçu (€) :</label>
                                            <input 
                                                type="number" 
                                                placeholder="0.00"
                                                className="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-xs font-black outline-none focus:border-teal-500"
                                                defaultValue={stats.manualInami || ''}
                                                onBlur={(e) => saveManualInami(e.target.value)}
                                            />
                                        </div>
                                    </StatCard>

                                    <StatCard title="En Attente" value={`${stats.enAttente.toLocaleString()}€`} subValue="Reste à percevoir sur ce mois" iconName="Clock" colorClass="bg-orange-500" />
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {[
                                        { t: "Répartition Services", d: stats.catData, c: COLORS_DARK },
                                        { t: "Lieu de consultation", d: stats.modData, c: ['#1e293b', '#2dd4bf'] },
                                        { t: "Flux de Trésorerie", d: stats.payData, c: ['#0d9488', '#818cf8'] }
                                    ].map((chart, i) => (
                                        <div key={i} className="bg-slate-900 border border-slate-800 p-6 rounded-2xl h-[340px] flex flex-col">
                                            <h3 className="text-[9px] font-black uppercase opacity-50 mb-6 tracking-widest">{chart.t}</h3>
                                            <div className="flex-1">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart>
                                                        <Pie data={chart.d.filter(d=>d.value>0)} innerRadius={55} outerRadius={75} dataKey="value" stroke="none" paddingAngle={5}>
                                                            {chart.d.map((_, j) => <Cell key={j} fill={chart.c[j % chart.c.length]} />)}
                                                        </Pie>
                                                        <Tooltip contentStyle={{backgroundColor:'#0f172a', border:'none', borderRadius:'10px', fontSize:'10px', color: '#fff'}} />
                                                        <Legend verticalAlign="bottom" wrapperStyle={{fontSize:'9px', paddingTop:'20px'}} />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'add' && (
                            <div className="max-w-lg mx-auto page-transition pb-20">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black uppercase tracking-tighter">Nouvelle Saisie</h2>
                                    <button onClick={() => setActiveTab('dash_month')} className="p-2 text-slate-500"><Icon name="X" /></button>
                                </div>
                                <form onSubmit={handleSubmit} className="bg-slate-900 border border-slate-800 p-8 rounded-psy space-y-6 shadow-2xl">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1"><label className="text-[9px] font-black uppercase opacity-40">Date</label><input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 font-black text-xs outline-none focus:border-teal-500" /></div>
                                        <div className="space-y-1"><label className="text-[9px] font-black uppercase opacity-40">Patient</label><input type="text" placeholder="Nom..." value={formData.clientName} onChange={e => setFormData({...formData, clientName: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 font-black text-xs outline-none focus:border-teal-500" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        {cabinets.map(c => <button key={c} type="button" onClick={() => setFormData({...formData, cabinet: c})} className={`py-3.5 rounded-2xl border-2 transition-all font-black uppercase text-[10px] ${formData.cabinet === c ? 'bg-teal-500 border-teal-500 text-slate-950' : 'border-slate-800 text-slate-500'}`}>{c}</button>)}
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1"><label className="text-[9px] font-black uppercase opacity-40">Paiement</label><select value={formData.paymentMethod} onChange={e => setFormData({...formData, paymentMethod: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 font-black text-xs outline-none">{['Virement bancaire', 'Espèces', 'INAMI'].map(p => <option key={p} value={p}>{p}</option>)}</select></div>
                                        <div className="space-y-1"><label className="text-[9px] font-black uppercase opacity-40">Service</label><select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 font-black text-xs outline-none">{categories.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
                                    </div>
                                    <div className="relative pt-4"><span className="absolute left-6 bottom-10 font-black text-teal-600 text-3xl opacity-40">€</span><input type="number" step="0.01" required placeholder="0.00" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="w-full py-12 rounded-3xl bg-slate-950 border-2 border-slate-800 text-5xl font-black text-center outline-none focus:border-teal-500 transition-all" /></div>
                                    <button type="submit" className="w-full py-6 rounded-3xl bg-teal-500 text-slate-950 font-black uppercase tracking-widest shadow-xl">Enregistrer</button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-8 page-transition pb-20">
                                <h2 className="text-2xl font-black uppercase tracking-tighter">Journal Hebdomadaire</h2>
                                {Object.entries(groupedWeeks).map(([wName, wSessions]) => wSessions.length > 0 && (
                                    <div key={wName} className="space-y-4">
                                        <div className="flex justify-between border-b border-teal-500/20 pb-2 px-2"><h3 className="text-xs font-black uppercase text-teal-500 font-bold">{wName}</h3><p className="text-[10px] font-black opacity-30">{wSessions.reduce((acc,s)=>acc+(parseFloat(s.amount)||0),0).toLocaleString()}€</p></div>
                                        <div className="space-y-3">
                                            {wSessions.map(s => (
                                                <div key={s.id} className="p-5 rounded-2xl border border-slate-800 bg-slate-900 flex flex-col gap-3 shadow-xl transition-all">
                                                    <div className="flex justify-between items-start">
                                                        <div><p className="text-sm font-black uppercase">{s.clientName || 'Anonyme'}</p><p className="text-[9px] font-bold text-slate-500 uppercase">{s.category} • {s.cabinet} • {s.paymentMethod}</p></div>
                                                        <div className="text-right"><p className="text-xl font-black">{s.amount}€</p><button onClick={()=>togglePaid(s)} className={`text-[7px] font-black uppercase px-2 py-1 rounded-full border transition-all ${s.isPaid?'bg-teal-500/10 text-teal-500 border-teal-500/20':'bg-red-600 text-white border-red-600'}`}>{s.isPaid?'Payé':'À payer'}</button></div>
                                                    </div>
                                                    <div className="flex justify-between items-center pt-2 border-t border-slate-800/40">
                                                        <p className="text-[8px] font-black uppercase text-slate-500">{new Date(s.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}</p>
                                                        <button onClick={()=>deleteSession(s.id)} className="text-slate-600 hover:text-red-500 p-2"><Icon name="Trash2" size={14}/></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="md:hidden fixed bottom-0 left-0 right-0 h-24 border-t border-slate-800 bg-slate-950/95 backdrop-blur-xl flex items-center justify-around px-4 z-50">
                        {NAV_TABS.map(t => <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex flex-col items-center gap-1.5 transition-all ${activeTab === t.id ? 'text-teal-500 font-black' : 'text-slate-500 opacity-60'}`}><div className={`p-2 rounded-2xl ${activeTab === t.id ? 'bg-teal-500/10' : ''}`}><Icon name={t.icon} size={22} /></div><span className="text-[7px] font-black uppercase tracking-widest">{t.label}</span></button>)}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
