<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ak Mindstep Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDV_kmvQC6yAtA95efs33S17SiYopp0r2c",
            authDomain: "ak-minstep-consult-tracker.firebaseapp.com",
            projectId: "ak-minstep-consult-tracker",
            storageBucket: "ak-minstep-consult-tracker.firebasestorage.app",
            messagingSenderId: "1076236018116",
            appId: "1:1076236018116:web:9fdfdddede40fea2528491"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.api = { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc };
        const auth = getAuth(app);
        signInAnonymously(auth).then(() => { window.isAuth = true; });
    </script>
</head>
<body class="bg-slate-950 text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [ready, setReady] = useState(false);
            const [tab, setTab] = useState('dash');
            const [sessions, setSessions] = useState([]);
            const [amount, setAmount] = useState('');
            const [cabinet, setCabinet] = useState('Koekelberg');

            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.isAuth && window.db) {
                        clearInterval(interval);
                        const q = window.api.query(window.api.collection(window.db, "sessions"), window.api.orderBy("date", "desc"));
                        window.api.onSnapshot(q, (snapshot) => {
                            setSessions(snapshot.docs.map(d => ({id: d.id, ...d.data()})));
                            setReady(true);
                        });
                    }
                }, 500);
            }, []);

            const save = async (e) => {
                e.preventDefault();
                if(!amount) return;
                await window.api.addDoc(window.api.collection(window.db, "sessions"), {
                    amount: parseFloat(amount),
                    cabinet: cabinet,
                    date: new Date().toISOString()
                });
                setAmount('');
                setTab('dash');
            };

            if (!ready) return <div className="h-screen flex items-center justify-center font-bold uppercase tracking-widest animate-pulse">Lancement...</div>;

            const total = sessions.reduce((acc, s) => acc + (s.amount || 0), 0);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col p-6">
                    <header className="mb-10 flex justify-between items-center">
                        <h1 className="text-2xl font-black uppercase italic tracking-tighter">Ak Mindstep</h1>
                        <span className="text-[10px] bg-teal-500/20 text-teal-400 px-3 py-1 rounded-full font-bold">ONLINE</span>
                    </header>

                    {tab === 'dash' && (
                        <div className="space-y-6">
                            <div className="bg-slate-900 p-8 rounded-[2rem] border border-white/5 text-center">
                                <p className="text-[10px] font-bold uppercase text-slate-500 mb-2">Total Encaissé</p>
                                <p className="text-5xl font-black text-teal-400">{total} €</p>
                            </div>
                            
                            <div className="space-y-3">
                                <h2 className="text-[10px] font-bold uppercase text-slate-500 ml-2">Derniers encodages</h2>
                                {sessions.slice(0, 5).map(s => (
                                    <div key={s.id} className="bg-slate-900/50 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                                        <div className="text-[10px] font-bold uppercase">{s.cabinet}</div>
                                        <div className="font-black text-teal-400">+{s.amount} €</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {tab === 'add' && (
                        <form onSubmit={save} className="space-y-6">
                            <h2 className="text-xl font-black uppercase">Nouvelle Séance</h2>
                            <div className="grid grid-cols-2 gap-2">
                                {['Koekelberg', 'Bruxelles-Sud'].map(c => (
                                    <button key={c} type="button" onClick={() => setCabinet(c)} className={`p-4 rounded-2xl text-[10px] font-bold uppercase border ${cabinet === c ? 'bg-white text-black' : 'bg-slate-900 border-white/5'}`}>{c}</button>
                                ))}
                            </div>
                            <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="Montant €" className="w-full bg-slate-900 p-6 rounded-3xl text-3xl font-black outline-none border-2 border-transparent focus:border-teal-500 text-teal-400" />
                            <button type="submit" className="w-full bg-white text-black p-6 rounded-[2rem] font-bold uppercase">Enregistrer</button>
                        </form>
                    )}

                    <nav className="fixed bottom-6 left-6 right-6 h-20 bg-slate-900 rounded-[2.5rem] border border-white/10 flex justify-around items-center px-4 shadow-2xl">
                        <button onClick={() => setTab('dash')} className={`p-4 font-black ${tab === 'dash' ? 'text-teal-400' : 'text-slate-500'}`}>HOME</button>
                        <button onClick={() => setTab('add')} className="w-14 h-14 bg-white rounded-full flex items-center justify-center -mt-12 border-4 border-slate-950 text-black font-black">+</button>
                        <button onClick={() => setTab('dash')} className="p-4 font-black text-slate-500">LIST</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
