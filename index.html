<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ak Mindstep Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDV_kmvQC6yAtA95efs33S17SiYopp0r2c",
            authDomain: "ak-minstep-consult-tracker.firebaseapp.com",
            projectId: "ak-minstep-consult-tracker",
            storageBucket: "ak-minstep-consult-tracker.firebasestorage.app",
            messagingSenderId: "1076236018116",
            appId: "1:1076236018116:web:9fdfdddede40fea2528491"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.api = { collection, addDoc, onSnapshot, query, orderBy };
        const auth = getAuth(app);
        signInAnonymously(auth).then(() => { window.isAuth = true; });
    </script>
</head>
<body class="bg-slate-950 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [sessions, setSessions] = useState([]);
            const [amount, setAmount] = useState('');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.db && window.isAuth) {
                        clearInterval(check);
                        const q = window.api.query(window.api.collection(window.db, "sessions"), window.api.orderBy("date", "desc"));
                        window.api.onSnapshot(q, (snapshot) => {
                            setSessions(snapshot.docs.map(d => ({id: d.id, ...d.data()})));
                            setLoading(false);
                            setTimeout(() => lucide.createIcons(), 100);
                        });
                    }
                }, 500);
            }, []);

            const addSession = async (e) => {
                e.preventDefault();
                if (!amount) return;
                await window.api.addDoc(window.api.collection(window.db, "sessions"), {
                    amount: parseFloat(amount),
                    date: new Date().toISOString()
                });
                setAmount('');
            };

            const total = sessions.reduce((acc, s) => acc + s.amount, 0);

            if (loading) return <div className="h-screen flex items-center justify-center font-black uppercase tracking-widest animate-pulse">Sync Ak Mindstep...</div>;

            return (
                <div className="max-w-md mx-auto p-6 md:pt-12">
                    <header className="flex items-center gap-4 mb-10">
                        <div className="w-12 h-12 bg-teal-500 rounded-2xl flex items-center justify-center shadow-lg shadow-teal-500/20">
                            <i data-lucide="trending-up" className="text-white w-6 h-6"></i>
                        </div>
                        <h1 className="text-2xl font-black uppercase italic tracking-tighter">Ak Mindstep</h1>
                    </header>

                    <div className="bg-slate-900 p-8 rounded-[2.5rem] border border-white/5 mb-6 text-center">
                        <p className="text-[10px] font-black uppercase text-slate-500 mb-2 tracking-widest">Total Encaissé</p>
                        <p className="text-5xl font-black text-teal-400">{total.toLocaleString()} €</p>
                    </div>

                    <form onSubmit={addSession} className="bg-white p-8 rounded-[2.5rem] mb-10 shadow-2xl">
                        <label className="text-slate-400 text-[10px] font-black uppercase block mb-4">Nouvelle Consultation (€)</label>
                        <div className="flex gap-2">
                            <input 
                                type="number" 
                                value={amount} 
                                onChange={(e) => setAmount(e.target.value)}
                                placeholder="Montant" 
                                className="flex-1 bg-slate-100 border-none rounded-2xl p-4 text-slate-900 font-black text-xl outline-none focus:ring-2 ring-teal-500"
                            />
                            <button type="submit" className="bg-slate-950 p-4 rounded-2xl text-white">
                                <i data-lucide="plus"></i>
                            </button>
                        </div>
                    </form>

                    <div className="space-y-3">
                        <h2 className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-4 ml-2">Historique récent</h2>
                        {sessions.map(s => (
                            <div key={s.id} className="bg-slate-900/50 p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                                <span className="text-[10px] font-bold text-slate-500 uppercase">{new Date(s.date).toLocaleDateString()}</span>
                                <span className="font-black text-teal-400">+{s.amount} €</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
